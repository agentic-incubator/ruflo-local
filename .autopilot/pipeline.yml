# pipeline.yml — autopilot feature pipeline for ruflo-local.
# Feature: strengthen the guided router (limitations §1,§2,§3,§4,§7) + Bifrost variant profile.
# Generated by autopilot:plan on 2026-07-02. Edit freely — it's just data.

# ─────────────────────────────────────────────────────────────────────────────
# YOU SUPPLY THIS
# ─────────────────────────────────────────────────────────────────────────────
feature_id: "guided-router-mitigations"
goal: "Strengthen the guided router by applying limitations-doc mitigations §1, §2, §3, §4 and §7 as in-repo gateway config + harness scripts + docs, and add mutually-exclusive, profile-activatable gateway variants (litellm default, plus bifrost and helicone) each with dedicated deployment docs."
spec: "docs/guide/reference/limitations-and-mitigations.md — the '🛡️ Strengthening the guided router' section, mitigations §1 (routing signal), §2 (tool-calling escalation), §3 (in-band quality verification), §4 (budget-steered routing), §7 (OTel observability). Scope is a THIS-REPO OVERLAY: gateway config (litellm-config.yaml, ruflo-tiers.json, docker-compose.yml), new harness scripts, .env.example, and docs — NOT upstream ruflo TypeScript patches. §5/§6 (share governor + governor stability) are explicitly OUT of scope."

# Design corpus autopilot reads before/while building. Each phase reads only its slice.
references:
  prd:     ""
  plan:    "docs/guide/reference/architecture-rfc.md"   # 5-path decision + Path-2 target architecture + §8 observability/schema specs
  adr_dir: ""                                            # no formal ADR dir in this kit
  ddd_dir: ""                                            # no DDD dir in this kit
  extra:
    - "docs/guide/reference/limitations-and-mitigations.md"   # the source-of-truth mitigations §1–§7 + priority order
    - "docs/guide/reference/tiers-and-routing.md"             # tier aliases, fall-through ladder, ruflo integration
    - "docs/guide/reference/observability.md"                 # PromQL panels, weekly review, quality-regression harness
    - "docs/guide/reference/hardware-and-models.md"           # model-selection rationale behind the tool-calling escalation (§2)
    - "docs/guide/reference/resources.md"                     # existing Bifrost positioning (µs-class Go gateway, native OTel)
    - "litellm-config.yaml"                                   # gateway model_list + fallbacks + budgets (edit target)
    - "ruflo-tiers.json"                                      # v1 per-tier alts consumed by ruflo — must stay v1-consumable
    - "https://github.com/Helicone/ai-gateway"                # Helicone AI Gateway (Rust, Apache-2.0) — the §5b variant

# Branch model. trunk is NEVER auto-merged — a human merges the final PR.
trunk: main
base:  autopilot/guided-router-mitigations   # the experimental integration branch this work lands on

autonomy: reviewed          # implement one phase, commit a `gate PASSED` marker, STOP for inspection
fix_budget: 5

# Phases with real behavioral blast radius get the heavier adversarial review.
risk_phases: [4, 5, 6]

# ─────────────────────────────────────────────────────────────────────────────
# GENERATED by autopilot:plan — edit freely
# ─────────────────────────────────────────────────────────────────────────────
phases:
  # ── §1 + §2 ────────────────────────────────────────────────────────────────
  - id: 1
    goal: "Route on difficulty, not length: enable the shipped neural router and make agentic/multi-turn tool-calling a hard escalation signal independent of prompt length — additively, without breaking ruflo-tiers.json's v1 schema."
    deliverables:
      - "New companion policy file (e.g. router-policy.example.json) expressing non-length features (stack-trace / multi-file / 'prove|design|refactor-across-files') and a per-agent-type tier floor so tool-driven turns start at tier-heavy or frontier."
      - ".env.example: CLAUDE_FLOW_ROUTER_NEURAL=1 plus the related neural-router env (embedding/kNN path) with inline guidance."
      - "docs/guide/reference/tiers-and-routing.md: a 'Stronger routing signal (§1)' subsection (neural router activation + non-length features + HNSW semantic route-cache note) and a 'Tool-calling escalation floor (§2)' subsection."
      - "limitations-and-mitigations.md: §1 and §2 mitigation blocks annotated as APPLIED with a pointer to the new config/docs."
    definition_of_done:
      - "cmd: jq -e . ruflo-tiers.json >/dev/null  — existing alts file still valid JSON"
      - "cmd: jq -e '._meta.schema_version == 1' ruflo-tiers.json  — v1 schema preserved (no upstream-only v2 break)"
      - "grep: CLAUDE_FLOW_ROUTER_NEURAL in .env.example"
      - "grep: tier_floor|tier-floor|escalation in the new router-policy example file"
      - "cmd: jq -e . router-policy.example.json >/dev/null  — new policy file is valid JSON"
      - "grep: Tool-calling escalation in docs/guide/reference/tiers-and-routing.md"
      - "cmd: docker compose config -q  — compose still assembles"
    conventions: "Root-level config files; env referenced as ${VAR}; docs under docs/guide/reference/ keep the '← Back to …' nav line and emoji-prefixed headings. Do NOT mutate ruflo-tiers.json's tiers.haiku/sonnet/opus shape — express new policy in a separate additive file."
    depends_on: []
    adrs:  []
    ddd:   []

  # ── §7 ───────────────────────────────────────────────────────────────────────
  - id: 2
    goal: "Lay the OpenTelemetry GenAI observability substrate the other mitigations depend on: gateway spans carrying gen_ai.* attributes, a collector in the compose stack, and the remaining-budget Prometheus gauges enabled."
    deliverables:
      - "litellm-config.yaml: add the 'otel' callback alongside 'prometheus'; enable prometheus_initialize_budget_metrics: true so idle-key budget gauges emit."
      - "docker-compose.yml: an otel-collector service (+ otel-collector-config.yaml) receiving OTLP from the gateway and exporting to Prometheus; version-pinned image."
      - "prometheus.yml: scrape/receive path for the collector's exported metrics if needed."
      - "docs/guide/reference/observability.md: an 'OpenTelemetry GenAI spans (§7)' section documenting gen_ai.usage.input_tokens/output_tokens, gen_ai.request.model, gen_ai.provider.name, with the 'Development'-status version-pin caveat."
    definition_of_done:
      - "grep: otel in litellm-config.yaml  (callbacks list includes the OTel callback)"
      - "grep: prometheus_initialize_budget_metrics in litellm-config.yaml"
      - "grep: otel-collector in docker-compose.yml"
      - "cmd: docker compose config -q  — collector service is valid"
      - "cmd: yamllint -d relaxed otel-collector-config.yaml  — new collector config lints clean"
      - "grep: gen_ai.usage in docs/guide/reference/observability.md"
    conventions: "Pin the collector image to a specific tag (no :latest). Keep turn_off_message_logging: true intact — spans carry token/metadata, never prompt bodies. Mirror the existing service block style in docker-compose.yml (named volumes, healthchecks where the others have them)."
    depends_on: []
    adrs:  []
    ddd:   []

  # ── §4 ───────────────────────────────────────────────────────────────────────
  - id: 3
    goal: "Make budget steer, not just alert: express LiteLLM provider-budget routing so over-budget deployments are skipped (429) before hard-stop, track a token budget alongside USD, and plumb the cost-tracker's JSON into the routing decision (documented for the ruflo route() side)."
    deliverables:
      - "litellm-config.yaml: provider/deployment budget routing that demotes-then-masks frontier as budget fills (the 429-skip semantics), plus token-budget alongside the existing USD max_budget."
      - "A helper (e.g. scripts/budget-snapshot.sh) that emits the remaining-budget snapshot as JSON (from the gateway /spend or cost-summary) for a router to consume."
      - "docs/guide/reference/budgets-and-tradeoffs.md (and/or tiers-and-routing.md): a 'Budget-steered routing (§4)' section — demotion rungs across 50/75/90, mask-at-100 except pinned/escalation-forced, 429 fail-closed backstop, token+USD dual budget."
      - "limitations-and-mitigations.md: §4 annotated APPLIED."
    definition_of_done:
      - "cmd: docker compose config -q  — budget config still renders"
      - "cmd: bash -n scripts/budget-snapshot.sh  — helper parses (no syntax errors)"
      - "cmd: shellcheck scripts/budget-snapshot.sh  — helper is clean"
      - "grep: Budget-steered routing in docs/guide/reference/budgets-and-tradeoffs.md"
      - "grep: 429 in docs/guide/reference/budgets-and-tradeoffs.md  — fail-closed backstop documented"
      - "grep:absent: TODO|FIXME in scripts/budget-snapshot.sh"
    conventions: "Bash helpers: '#!/usr/bin/env bash' + 'set -euo pipefail'; GW/KEY overridable via env exactly like smoke-test.sh. Keep tier-private out of every budget/fallback path — the privacy pin is inviolable."
    depends_on: [2]
    adrs:  []
    ddd:   []

  # ── §3 ───────────────────────────────────────────────────────────────────────
  - id: 4
    goal: "Add in-band quality detection the error-based ladder can't provide: a FrugalGPT-style verify-then-escalate scorer on designated task classes (swap-averaged / rubric-anchored judge treated as noisy) plus a quality-regression harness that gates model swaps."
    deliverables:
      - "scripts/verify-escalate.sh — scores a tier-fast answer with a swap-averaged/rubric-anchored judge and escalates only on a low score; judge output treated as noisy (position-swap averaged)."
      - "scripts/quality-regression.sh — runs a fixed prompt corpus (a committed prompts file) through tier-fast vs tier-frontier and reports the diff, exit-nonzero on regression beyond threshold, for CI use after a model swap."
      - "A small committed corpus file (e.g. tests/quality-prompts.jsonl) of representative prompts."
      - "docs/guide/reference/observability.md 'Quality-regression harness' section fleshed out to reference the new scripts; limitations §3 annotated APPLIED with the LLM-judge-bias caveat."
    definition_of_done:
      - "cmd: bash -n scripts/verify-escalate.sh && bash -n scripts/quality-regression.sh"
      - "cmd: shellcheck scripts/verify-escalate.sh scripts/quality-regression.sh"
      - "cmd: scripts/quality-regression.sh --help  — prints usage and exits 0"
      - "cmd: jq -e '. ' tests/quality-prompts.jsonl >/dev/null 2>&1 || while read -r l; do echo \"$l\" | jq -e . >/dev/null; done < tests/quality-prompts.jsonl  — every corpus line is valid JSON"
      - "grep: swap-averaged|position-swap|rubric in scripts/verify-escalate.sh  — judge-bias mitigation present"
      - "grep:absent: TODO|FIXME in scripts/verify-escalate.sh scripts/quality-regression.sh"
    conventions: "Same bash header/env conventions as smoke-test.sh. The judge is noisy: average across at least one position swap and anchor to a rubric string — never trust a single raw score. Scripts must degrade gracefully (skip, exit 0 with a notice) when no frontier key is configured, mirroring smoke-test.sh's tier-frontier handling."
    depends_on: [1, 2]
    adrs:  []
    ddd:   []

  # ── Gateway-selector framework + Bifrost variant ─────────────────────────────
  - id: 5
    goal: "Make the gateway pluggable and mutually exclusive — exactly ONE of litellm (default) / bifrost / helicone runs at a time on the :4000 seam — and land the first alternative, Bifrost (Rust/Go, native OTel), mirroring the same tiers/budgets with a benchmark and dedicated docs. No default cutover: plain `docker compose up -d` still runs LiteLLM."
    deliverables:
      - "docker-compose.yml: move the existing litellm service behind a compose `profiles: [litellm]`, add a `bifrost` service behind `profiles: [bifrost]` (version-pinned maximhq/bifrost image + bifrost config file); a single selector (COMPOSE_PROFILES, defaulted to `litellm` in .env.example) chooses the active gateway so only one binds :4000."
      - "Bifrost config mirroring tier-fast/heavy/frontier/private, the frontier budgets, and the tier-private NO-FALLBACK privacy pin exactly as LiteLLM enforces it."
      - "docs/guide/reference/gateway-variants.md — the shared 'choosing/switching your gateway' guide (the selector, the one-at-a-time rule, litellm default, how to switch) + a Bifrost section (activate, config mapping, what carries over vs differs: budgets, fallbacks, metrics, privacy pin), linked from resources.md and the guide README."
      - "scripts/bench-gateway.sh — a like-for-like overhead benchmark across the active gateway (records p50/p95 added latency), reusable for all three variants."
    definition_of_done:
      - "cmd: docker compose config --services | grep -qx litellm  — litellm is the DEFAULT-active gateway (via .env COMPOSE_PROFILES=litellm)"
      - "cmd: ! docker compose config --services | grep -qx bifrost  — bifrost is NOT active by default"
      - "cmd: COMPOSE_PROFILES=bifrost docker compose config --services | grep -qx bifrost  — selecting bifrost activates it"
      - "cmd: ! (COMPOSE_PROFILES=bifrost docker compose config --services | grep -qx litellm)  — selecting bifrost DEACTIVATES litellm (mutual exclusion)"
      - "cmd: docker compose config -q && COMPOSE_PROFILES=bifrost docker compose config -q  — both resolutions assemble"
      - "grep: COMPOSE_PROFILES in .env.example  — the gateway selector is documented with litellm as the default"
      - "cmd: test -f docs/guide/reference/gateway-variants.md && grep -qi bifrost docs/guide/reference/gateway-variants.md"
      - "grep: tier-private in docs/guide/reference/gateway-variants.md  — privacy-pin behavior under the alternate gateway is documented"
      - "cmd: bash -n scripts/bench-gateway.sh && shellcheck scripts/bench-gateway.sh"
    conventions: "Only the GATEWAY service is profile-swapped; shared infra (ollama, vllm, prometheus, grafana) stays default-on. Postgres/litellm_db may ride the `litellm` profile since only LiteLLM needs it. Pin every image tag (no :latest). The four-tier alias vocabulary and the tier-private no-fallback guarantee are inviolable across every gateway. `docker compose up -d` with the shipped .env MUST still yield LiteLLM — no behavior change for existing users."
    depends_on: [1, 2, 3]
    adrs:  []
    ddd:   []

  # ── Helicone variant ─────────────────────────────────────────────────────────
  - id: 6
    goal: "Add Helicone AI Gateway (Rust, Apache-2.0; native OTel + rich budgets/caching) as the third mutually-exclusive gateway option under the Phase-5 selector, mirroring the tiers/budgets/privacy-pin, benchmarked, with its own deployment docs."
    deliverables:
      - "docker-compose.yml: a `helicone` service behind `profiles: [helicone]` (version-pinned helicone/ai-gateway image + config.yaml) that also binds the :4000 seam, so `COMPOSE_PROFILES=helicone` runs it INSTEAD of litellm/bifrost."
      - "Helicone config.yaml mirroring tier-fast/heavy/frontier/private, the frontier USD/token budgets (Helicone's request/token/$ limits), and the tier-private local-only route with failover DISABLED (the privacy pin — Helicone's caveat from the suitability review)."
      - "docs/guide/reference/gateway-variants.md: a Helicone section + a three-way comparison table (litellm / bifrost / helicone: footprint, budgets, OTel, caching, when to pick which)."
      - "Benchmark row for Helicone via scripts/bench-gateway.sh."
    definition_of_done:
      - "cmd: COMPOSE_PROFILES=helicone docker compose config --services | grep -qx helicone  — helicone activates"
      - "cmd: ! (COMPOSE_PROFILES=helicone docker compose config --services | grep -qx litellm)  — and litellm is off (mutual exclusion holds)"
      - "cmd: ! (COMPOSE_PROFILES=helicone docker compose config --services | grep -qx bifrost)  — bifrost is off too (exactly one gateway)"
      - "cmd: COMPOSE_PROFILES=helicone docker compose config -q  — the Helicone variant assembles"
      - "cmd: docker compose config --services | grep -qx litellm  — default is STILL litellm (unchanged by adding helicone)"
      - "grep: helicone in docs/guide/reference/gateway-variants.md  — Helicone section present"
      - "grep:absent: TODO|FIXME in the Helicone config file"
      - "grep: tier-private in docs/guide/reference/gateway-variants.md  — privacy pin under Helicone documented (failover disabled)"
    conventions: "Reuse the Phase-5 selector as-is — do NOT invent a second switching mechanism. Same inviolable rules: four-tier vocabulary + tier-private no-fallback. Pin the image tag. Helicone caching (Redis/S3) is OPTIONAL and must default OFF so the standalone variant needs no extra services."
    depends_on: [5]
    adrs:  []
    ddd:   []

  # ── Docs coherence + honest-list refresh ─────────────────────────────────────
  - id: 7
    goal: "Make the docs whole and honest again: flip the limitations 'honest list' + priority-order table to reflect what now ships, ensure every mitigation section, tiers/observability/budgets doc, and the three gateway variants cross-link cleanly, with no stale 'not solved' claims for §1–§4/§7."
    deliverables:
      - "limitations-and-mitigations.md: 'What this doesn't solve' items and the '🥇 Priority order' table updated to mark §1,§2,§3,§4,§7 as shipped/available (item #7 LiteLLM-ceiling gains a pointer to the bifrost AND helicone variants); §5/§6 clearly still open."
      - "Cross-link pass across tiers-and-routing.md, observability.md, budgets-and-tradeoffs.md, resources.md, and the guide README so the new sections/scripts/gateway variants are discoverable."
      - "getting-started-technical.md (and nontechnical where relevant): a pointer to the strengthened-router options and the pluggable gateway variants (litellm default / bifrost / helicone)."
    definition_of_done:
      - "grep: APPLIED|shipped|available in docs/guide/reference/limitations-and-mitigations.md  — status annotations present for the applied mitigations"
      - "grep: gateway-variants in docs/guide/reference/limitations-and-mitigations.md  — item #7 points at the variants guide"
      - "grep: helicone in docs/guide/reference/gateway-variants.md  — three-way comparison present"
      - "cmd: yamllint -d relaxed docker-compose.yml litellm-config.yaml prometheus.yml grafana-datasources.yml  — all configs still lint clean"
      - "cmd: docker compose config -q && COMPOSE_PROFILES=bifrost docker compose config -q && COMPOSE_PROFILES=helicone docker compose config -q  — all three gateway resolutions assemble"
      - "cmd: docker compose config --services | grep -qx litellm  — litellm remains the default gateway"
    conventions: "Pure docs/coherence phase — no behavioral code changes. Preserve the house doc voice (emoji headings, '← Back' nav, callout blocks). Keep the honest-list honest: only mark a mitigation shipped if its phase actually landed it in-repo."
    depends_on: [1, 2, 3, 4, 5, 6]
