phases:
  # ── D1: make the upgrade real ────────────────────────────────────────────────
  - id: 0
    goal: "Make the ruflo upgrade actually take effect and capture a baseline: enable the ruflo MCP server, ensure the npx-resolved binary is >=3.18.1 (the #2549 fix, in @claude-flow/cli, which ruflo wraps), confirm ruflo's neural training backend reports available, and snapshot current routing behavior."
    deliverables:
      - ".claude/settings.json: add \"ruflo\" to enabledMcpjsonServers (pin already ruflo@3.21.1) so the fixed router is actually invocable."
      - "A refresh of the stale ~/.npm/_npx ruflo/claude-flow cache so >=3.21.1 resolves (documented as a manual step; the SESSION RESTART needed for the MCP change to load is flagged for the operator)."
      - "A baseline snapshot .autopilot/baseline/route-baseline.json (current tier shares + p50/p95 from bench-gateway)."
    definition_of_done:
      - "cmd: jq -e '.enabledMcpjsonServers | index(\"ruflo\") != null' .claude/settings.json >/dev/null  — ruflo MCP server enabled"
      - "cmd: jq -e '[.mcpServers.ruflo.args[] | select(test(\"^ruflo@3\\\\.(1[89]|[2-9][0-9])\"))] | length > 0' .claude/settings.json >/dev/null  — pin is >=3.18.x (the #2549 fix floor)"
      - "cmd: npx -y ruflo@3.21.1 --version  — the target ruflo actually resolves/downloads (no stale-cache failure)"
      - "cmd: test -f .autopilot/baseline/route-baseline.json && jq -e '.tier_shares and .latency' .autopilot/baseline/route-baseline.json >/dev/null  — baseline captured"
      - "prose: `npx ruflo@3.21.1 neural status` reports the native training backend as available (NOT 'unavailable') — the #2549 fix is live; captured in the phase notes since the exact CLI string is environment-dependent."
    conventions: "Only enable the ruflo MCP server; do NOT disable agentic-qe. The session restart + npx cache refresh are operator steps that cannot be gated — record them in the phase notes and verify via the version/neural-status commands. Do not wire ruflo into the product request path yet — that is Phase 4."
    depends_on: []
    adrs:  []
    ddd:   []

  # ── D2: portable runtime ─────────────────────────────────────────────────────
  - id: 1
    goal: "Port the four reward/verify/budget bash scripts to portable Node/.mjs modules with NO behavior change, so the judge can run in-process and the toolchain stops depending on bash/jq/curl and POSIX shells."
    deliverables:
      - "scripts/lib/verify-escalate.mjs — the FrugalGPT judge: position-swap-averaged, rubric-anchored, fail-closed, injection-hardened; emits the same {score,threshold,decision,passes,method,note} JSON as the bash version."
      - "scripts/lib/budget-snapshot.mjs, scripts/lib/bench-gateway.mjs, scripts/lib/quality-regression.mjs — ports of the remaining scripts."
      - "scripts/lib/gateway-client.mjs (OpenAI-compatible fetch, no curl), scripts/lib/reward.mjs (quality+cost+latency → scalar), scripts/lib/config.mjs (the CLAUDE_FLOW_ROUTER_* / JUDGE_MODEL env surface)."
      - "Node built-in (node:test + node:assert/strict) unit tests under scripts/lib/__tests__/ with a mocked gateway (AAA; happy path + fail-closed + injection + private-lane)."
      - "Thin bash shims kept so existing callers/CI still resolve."
    definition_of_done:
      - "cmd: for f in scripts/lib/verify-escalate.mjs scripts/lib/budget-snapshot.mjs scripts/lib/bench-gateway.mjs scripts/lib/quality-regression.mjs scripts/lib/gateway-client.mjs scripts/lib/reward.mjs scripts/lib/config.mjs; do node --check \"$f\" || exit 1; done  — every module parses"
      - "cmd: node --test scripts/lib/__tests__/*.test.mjs  — unit tests pass (glob form: portable across Node 22 CI and Node >=23 local; `node --test <dir>` was removed in Node 23)"
      - "cmd: node scripts/lib/verify-escalate.mjs --help  — prints usage, exits 0"
      - "grep: position-swap|swap-averaged|rubric in scripts/lib/verify-escalate.mjs  — judge-bias mitigation preserved"
      - "cmd: ! git grep -nE 'child_process|execSync|require\\(.child_process' -- scripts/lib/verify-escalate.mjs  — the judge does not shell out (pure node, portable)"
      - "grep:absent: TODO|FIXME in scripts/lib/"
    conventions: "Match the bash scripts' env-overridable knobs (GW/KEY/JUDGE_MODEL/VERIFY_THRESHOLD). Default JUDGE_MODEL to a LOCAL tier — FrugalGPT only wins if verification << generation. Modules degrade gracefully (skip, exit 0 with a notice) when no frontier key is configured, mirroring smoke-test.sh."
    depends_on: []
    adrs:  []
    ddd:   []

  # ── D3: correctness guarantee ────────────────────────────────────────────────
  - id: 2
    goal: "Wire the judge into the live loop as the safe reflex: on a local-tier response, score it and escalate to frontier only when the score is below the bar — the day-one fix for 'a confidently-wrong local answer is served'. Needs no embedding, no learning."
    deliverables:
      - "scripts/lib/reflex.mjs — verify-then-escalate wrapper on local-tier responses; returns the better answer; response-side only (the gateway stays dumb)."
      - "Node built-in (node:test) tests: known-bad local answer → escalates; good answer → kept; tier-private → NEVER escalates; reflex latency overhead recorded."
    definition_of_done:
      - "cmd: node --check scripts/lib/reflex.mjs"
      - "cmd: node --test scripts/lib/__tests__/reflex.test.mjs  — reflex behaviors pass (escalate-on-low, keep-on-high, private-never-escalate)"
      - "grep: tier-private in scripts/lib/reflex.mjs  — the privacy pin is enforced in the reflex path"
      - "grep:absent: TODO|FIXME in scripts/lib/reflex.mjs"
    conventions: "tier-private must never leave the box even on a low score — assert it with a dedicated test. Escalation targets frontier; the judge itself stays on the cheap/local tier. Keep the reflex a pure function of (response, score) so it is testable without live models."
    depends_on: [1]
    adrs:  []
    ddd:   []

  # ── D5: the no-backfill corpus ───────────────────────────────────────────────
  - id: 3
    goal: "Record every routing decision as a DRACO-shaped row — including the prompt embedding — into a ruvector RVF corpus, from day one while still routing per-category, so the per-question learner has training data with zero backfill when the gate wants it."
    deliverables:
      - "scripts/lib/recorder.mjs — embeds the prompt (ruflo ONNX / hooks_) and appends {prompt_hash, embedding, category, tier, judge_score, cost, latency, escalated} to .ruvector/routing-corpus.rvf."
      - "Node built-in (node:test) tests: a recorded row validates against the schema and includes a non-empty embedding; two records grow the store; the store reopens after a simulated restart."
    definition_of_done:
      - "cmd: node --check scripts/lib/recorder.mjs"
      - "cmd: node --test scripts/lib/__tests__/recorder.test.mjs  — append/schema/reopen tests pass"
      - "grep: embedding in scripts/lib/recorder.mjs  — the embedding is captured on the record path"
      - "prose: recording two requests increases the RVF vector count (rvf_status), proving the corpus is a real ruvector store, not a JSON stub — shown in the test output."
      - "grep:absent: TODO|FIXME in scripts/lib/recorder.mjs"
    conventions: "Store to an actual .rvf via the ruvector RVF API (crash-safe, single-writer) — not an ad-hoc JSON file. Never store raw prompt text if it could contain secrets; store a prompt_hash + the embedding. The recorder runs on EVERY request regardless of routing grain (this is what makes per-category-first non-throwaway)."
    depends_on: [1]
    adrs:  []
    ddd:   []

  # ── D4a: the champion ────────────────────────────────────────────────────────
  - id: 4
    goal: "Route per-category as the champion and make budget STEER the decision (not just alert): honor per-agent-type/task-class tier floors, feed the budget snapshot into route(), and invoke ruflo's router in the product path — all on tier-schema v1."
    deliverables:
      - "scripts/lib/router.mjs — the per-category champion: picks a tier by task class/agent type honoring config/routing/router-policy.example.json tier floors, with budget-snapshot.mjs demoting frontier per the utilization rungs; invokes ruflo route() in the product path (the Phase-0-deferred wiring)."
      - "Node built-in (node:test) tests: tier floors are never violated; rising budget utilization demotes then masks frontier per the rungs; tier-private is never demoted off-box."
    definition_of_done:
      - "cmd: jq -e '._meta.schema_version == 1' config/routing/ruflo-tiers.json  — v1 invariant still holds through the champion phase"
      - "cmd: node --check scripts/lib/router.mjs"
      - "cmd: node --test scripts/lib/__tests__/router.test.mjs  — floor + budget-demotion tests pass"
      - "grep: tier_floor|tier-floor in config/routing/router-policy.example.json  — per-category floors are the routing signal"
      - "grep: budget in scripts/lib/router.mjs  — budget is an input to the decision, not just an alert"
      - "grep:absent: TODO|FIXME in scripts/lib/router.mjs"
    conventions: "Stay on config/routing/ruflo-tiers.json v1 (no per-request locality yet). The router may score a request DOWN but never below its agent-type floor. Frontier share should trend toward the ~10% target but is not hard-gated here (that is measured, not asserted, at this phase)."
    depends_on: [1, 2, 3]
    adrs:  []
    ddd:   []

  # ── D4b: the automated coarse→fine switch ────────────────────────────────────
  - id: 5
    goal: "Add the per-question learned router as a shadow challenger and an evidence-gated promotion: train a KRR TrainedRouter on the corpus, run it in shadow (never serving), and auto-promote it over the champion only when it beats it on quality-per-dollar by a real, sustained margin — with auto-rollback on regression. This is ruflo's SelfEvolvingRouter pattern."
    deliverables:
      - "scripts/lib/train-router.mjs — trains a KRR TrainedRouter (portable JSON) on .ruvector/routing-corpus.rvf, seeded from tests/quality-prompts.jsonl → .ruvector/router-model.json."
      - "scripts/lib/challenger.mjs — runs the trained router in shadow via ruflo's router-parallel-recorder (records the would-pick decision without serving it)."
      - "scripts/lib/promotion-gate.mjs — champion/challenger gate: promotes only when challenger q/$ beats champion by a configurable margin over >=N samples across a rolling window with a CI lower-bound; auto-rolls-back a promoted router that regresses."
      - "Node built-in (node:test) tests: offline replay reports challenger vs champion vs per-question oracle; the gate does NOT promote on thin/insufficient data; an injected regression triggers rollback."
    definition_of_done:
      - "cmd: for f in scripts/lib/train-router.mjs scripts/lib/challenger.mjs scripts/lib/promotion-gate.mjs; do node --check \"$f\" || exit 1; done"
      - "cmd: node scripts/lib/train-router.mjs --seed tests/quality-prompts.jsonl --out .ruvector/router-model.json && jq -e '.candidates and .alpha' .ruvector/router-model.json >/dev/null  — a portable trained-router artifact is produced"
      - "cmd: node --test scripts/lib/__tests__/promotion.test.mjs  — replay + no-promote-on-thin-data + regression-rollback tests pass"
      - "grep: rollback in scripts/lib/promotion-gate.mjs  — auto-rollback path present"
      - "grep: shadow in scripts/lib/challenger.mjs  — the challenger never serves traffic"
      - "grep:absent: TODO|FIXME in scripts/lib/train-router.mjs scripts/lib/challenger.mjs scripts/lib/promotion-gate.mjs"
    conventions: "The challenger MUST run in shadow only until promoted — assert it in a test. Promotion thresholds (min samples/candidate, q/$ margin, window, CI bound) are config, defaulted conservative. The champion remains the fallback after a promotion; rollback restores it. Honest guardrail: on a tiny corpus the challenger will tie, not beat, the champion (the DRACO n≈20 ceiling) — the gate simply won't promote, and that's correct."
    depends_on: [4]
    adrs:  []
    ddd:   []

  # ── D6: per-request locality (gated on promotion) ────────────────────────────
  # ── D9a (2026-07-05 ecosystem audit): rvf 0.2.3 + no-stub real-embedder default ─
  - id: 6
    goal: "Ecosystem refresh + no-stub embeddings (audit 2026-07-05): take @ruvector/rvf 0.2.3 (fixes our upstream ruvnet/RuVector#641), make a REAL in-process embedder the DEFAULT for the recorder + trainer (hashEmbed demoted to an explicit opt-in / deterministic-test fallback), and honor the no-stub norm. Platform+substrate baseline for phases 7-12; the ruflo pin bump is deferred to phase 10 where the router is actually exercised."
    deliverables:
      - "package.json: @ruvector/rvf ^0.2.2 → ^0.2.3 (+ package-lock refreshed); recorder + train-router re-verified against it."
      - "scripts/lib/train-router.mjs (+ recorder default): DEFAULT to a real in-process embedder (ruvllm), degrading to hashEmbed only when ruvllm is absent AND RUFLO_REQUIRE_REAL_EMBEDDINGS is unset; RUFLO_REQUIRE_REAL_EMBEDDINGS=1 makes a hash fallback THROW (no silent meaningless vectors)."
      - "Any CLI-embed path uses stdin/--input-file (ruvector 0.2.34) so a raw prompt never lands on argv."
    definition_of_done:
      - "cmd: jq -e '.optionalDependencies[\"@ruvector/rvf\"] == \"^0.2.3\"' package.json  — rvf bumped"
      - "cmd: npm ci --no-audit --no-fund >/dev/null 2>&1; node --test scripts/lib/__tests__/*.test.mjs  — full suite green on refreshed deps"
      - "grep: REQUIRE_REAL_EMBEDDINGS in scripts/lib/train-router.mjs  — the no-stub guard is wired"
      - "grep:absent: TODO|FIXME in scripts/lib/train-router.mjs"
    conventions: "Additive/backward-compatible. Do NOT bump the ruflo pin here (phase 10 owns that). Keep hashEmbed importable so deterministic tests keep working; only the runtime DEFAULT changes to a real embedder."
    depends_on: [3, 5]
    adrs:  []
    ddd:   []

  # ── D6 (renumbered → 7): per-request locality (gated on promotion) ───────────
  # ── D6 → 7 (re-scoped 2026-07-05, Option A): forward-compatible locality, no breaking flip ─
  - id: 7
    goal: "Make the tier schema FORWARD-compatible and DECLARE per-request locality, without a breaking v2 flip and without waiting on a promotion that never fired. Grounding (2026-07-05): nothing runtime reads ruflo-tiers.json's schema_version (it's inert config metadata); per-request locality is ALREADY enforced at runtime (router.mjs `pinnedPrivate` → tier-private, never off-box) and tested airtight; ruflo does not define/require a v2 tier-locality schema. So the low-risk move is ADDITIVE + documentary, not a migration: each tier declares its DEFAULT locality (additive metadata ruflo/LiteLLM ignore), the invariant accepts schema_version ∈ {1,2}, and the per-request-override model is documented. Materializing a full v2 + activating it stays gated on a real promotion (phases 5/10) — this phase just makes the capability available and future-proof."
    deliverables:
      - "config/routing/ruflo-tiers.json: add an ADDITIVE `locality` field to each tier (local for tier-fast/heavy/private, cloud for frontier) — extra metadata ruflo/LiteLLM ignore; the `tiers` map shape they consume is UNCHANGED. schema_version may stay 1 or bump to 2 with all-v1 defaults."
      - "docs/guide/reference/tiers-and-routing.md: document that per-request locality is a RUNTIME request concern (the router's `pinnedPrivate` flag), that tiers declare only DEFAULT locality, and the (future) v2 shape a promoted per-question router would use."
    definition_of_done:
      - "cmd: jq -e '._meta.schema_version as $v | $v == 1 or $v == 2' config/routing/ruflo-tiers.json  — invariant accepts v1 OR v2 (forward-compatible; no breaking flip)"
      - "cmd: jq -e '.tiers | to_entries | all(.value | has(\"locality\"))' config/routing/ruflo-tiers.json  — every tier declares a default locality (additive; tiers are haiku/sonnet/opus → tier-fast/heavy/frontier)"
      - "cmd: jq -e '.tiers | to_entries | all(if .value.openrouter_alt == \"tier-frontier\" then .value.locality == \"cloud\" else .value.locality == \"local\" end)' config/routing/ruflo-tiers.json  — frontier=cloud, local tiers=local"
      - "cmd: jq -e . config/routing/ruflo-tiers.json >/dev/null  — valid JSON"
      - "grep: locality in docs/guide/reference/tiers-and-routing.md  — the runtime-override model + tier defaults documented"
      - "prose: the tier-private local-only pin is preserved — it stays a gateway alias with no fallback (litellm-config) + the runtime router.mjs `pinnedPrivate` lane; tier-private is deliberately NOT in ruflo-tiers.json's tier-alts map, so nothing here can weaken it."
      - "cmd: docker compose config -q  — the stack still assembles (consumed config shape unchanged)"
    conventions: "NON-BREAKING + ADDITIVE ONLY. Do NOT change the `tiers` map shape ruflo/LiteLLM consume, do NOT touch the rendered gateway configs, and do NOT reimplement per-request locality (it already lives — correctly and tested — in router.mjs/reflex.mjs `pinnedPrivate`). The tier-private local-only guarantee is inviolable (locality:local, no fallback). Full v2 materialization + its activation stay gated on a real promotion; this phase only makes the capability declared and forward-compatible."
    depends_on: [4]
    adrs:  []
    ddd:   []

  # ── D10 (new · risk): rigorous promotion proofs — anti-overfitting (ruflo 3.25.0) ─
  - id: 8
    goal: "Harden the Phase-5 promotion gate with ruflo 3.25.0's anti-overfitting methodology: a FROZEN hash-pinned held-out eval set (tamper-evident), a SIGNIFICANCE test on the challenger's win, a human-relevance-flat OVERFITTING guard surfaced in the decision, and a clean-room REPLAY of a promotion from its receipt alone (offline, no trusting our logs)."
    deliverables:
      - "A frozen, hash-pinned held-out eval set (tests/promotion-eval-frozen-v1.json) the gate must never regress against."
      - "scripts/lib/promotion-gate.mjs: add a significance test + a per-evaluation human-relevance-delta / overfitting flag; promotion additionally requires the frozen held-out to not regress."
      - "scripts/lib/replay-promotion.mjs: replay a promotion decision from its receipt alone — identical hashes, offline network-trapped — a clean-room acceptance check."
    definition_of_done:
      - "cmd: node --check scripts/lib/promotion-gate.mjs scripts/lib/replay-promotion.mjs"
      - "cmd: node --test scripts/lib/__tests__/promotion.test.mjs  — significance + frozen-held-out + replay tests pass"
      - "grep: significance|frozen in scripts/lib/promotion-gate.mjs"
      - "grep: overfit in scripts/lib/promotion-gate.mjs  — the self-metric-up/human-flat guard is present"
      - "grep:absent: TODO|FIXME in scripts/lib/promotion-gate.mjs scripts/lib/replay-promotion.mjs"
    conventions: "Do NOT weaken the F1-F3 fixes already in place (quality bar + no-regression CI + se-floor + trend-aware rollback); this phase ADDS the frozen held-out + significance + replay on top. Receipts must replay offline without trusting our logs."
    depends_on: [5]
    adrs:  []
    ddd:   []

  # ── D11 (new): no-stub embeddings + real negatives (ruflo 3.22 / 3.25.1) ──────
  - id: 9
    goal: "Feed the loop real signal: capture real PostToolUse FAILURES as corpus negatives (ruflo 3.22 fixed the hardcoded success:true), so the judge/oracle finally has negative examples, and complete the no-stub real-embedder adoption across the recorder + reflex paths."
    deliverables:
      - "The recorder/judge path records the real outcome (success AND failure), so the DRACO corpus carries negatives — not only accepted answers."
      - "Real-embedder-default completed across recorder.mjs + reflex.mjs consumers (building on phase 6); RUFLO_REQUIRE_REAL_EMBEDDINGS honored end-to-end."
      - "Node built-in tests: a failed decision is recorded as a negative; a real embedding is used unless explicitly overridden."
    definition_of_done:
      - "cmd: node --check scripts/lib/recorder.mjs scripts/lib/reflex.mjs"
      - "cmd: node --test scripts/lib/__tests__/*.test.mjs  — negative-capture + real-embedder tests pass"
      - "grep: fail|negative in scripts/lib/recorder.mjs  — negative outcomes are captured"
      - "grep:absent: TODO|FIXME in scripts/lib/recorder.mjs"
    conventions: "Negatives carry the SAME privacy guarantees as positives (prompt_hash + embedding only, never raw text). Do not regress the phase-2 fail-closed reflex or the phase-3 privacy invariants."
    depends_on: [2, 3, 4, 6]
    adrs:  []
    ddd:   []

  # ── D7 (renumbered → 10 · risk) + ruflo pin bump 3.25.1 (9b): alt-brain eval ──
  - id: 10
    goal: "Bump the ruflo pin 3.21.1 → 3.25.1 (validated against the full gate), THEN evaluate @metaharness/router's cost-optimal selector as an OFFLINE comparator against the (now-current) ruflo router on the corpus, and record an honest adopt/keep decision — never run two learners live at once."
    deliverables:
      - ".claude/settings.json: ruflo pin 3.21.1 → 3.25.1 (operator step: npx cache refresh + session restart noted), re-validated by the full gate."
      - "scripts/lib/metaharness-eval.mjs — trains/loads @metaharness/router on the corpus and scores it head-to-head vs the promoted ruflo router and the per-question oracle on a held-out split (on REAL embeddings from phase 9)."
      - ".autopilot/reports/metaharness-vs-ruflo.json — the comparison (quality, cost, q/$, % oracle, CI) + a documented adopt/keep recommendation; a decision note appended to docs/research/routing-refactor-decisions.md."
    definition_of_done:
      - "cmd: jq -e '[.mcpServers.ruflo.args[] | select(test(\"^ruflo@3\\\\.25\"))] | length > 0' .claude/settings.json  — pin bumped to 3.25.x"
      - "cmd: node --check scripts/lib/metaharness-eval.mjs"
      - "cmd: node scripts/lib/metaharness-eval.mjs --corpus .ruvector/routing-corpus.rvf --out .autopilot/reports/metaharness-vs-ruflo.json && jq -e '.ruflo and .metaharness and .oracle' .autopilot/reports/metaharness-vs-ruflo.json >/dev/null  — three-way head-to-head produced"
      - "grep: adopt|keep in .autopilot/reports/metaharness-vs-ruflo.json  — an explicit recommendation is recorded"
      - "grep: Phase 10 in docs/research/routing-refactor-decisions.md  — the outcome is written back to the decision record"
    conventions: "OFFLINE evaluation on the committed corpus — no second live learner. If (and only if) metaharness wins on the held-out split, adoption DISABLES ruflo's learner (two-brain label blur, per metaharness-and-ruflo-local.md). The ruflo bump is additive/backward-compatible per the 3.22-3.25.1 notes but is a day-old release — validate the whole gate before proceeding."
    depends_on: [5, 9]
    adrs:  []
    ddd:   []

