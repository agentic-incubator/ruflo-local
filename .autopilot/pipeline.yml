# pipeline.yml — autopilot feature pipeline for ruflo-local.
# Feature: local-first learned routing — turn the dormant local-first escalation design into a
# working, self-improving loop (one brain = ruflo's, judge wired in as a day-one reflex,
# per-category routing that auto-graduates to per-question via an evidence-gated promotion).
# Generated by autopilot:plan on 2026-07-04. Replaces the completed guided-router-mitigations
# pipeline (retired to git history + .autopilot/runs/guided-router-mitigations.jsonl). Edit freely.

# ─────────────────────────────────────────────────────────────────────────────
# YOU SUPPLY THIS
# ─────────────────────────────────────────────────────────────────────────────
feature_id: "local-first-learned-routing"
goal: "Stand up the local-first learned-routing loop: make the ruflo upgrade real, port the reward/verify/budget bash scripts to portable Node/.mjs, wire the quality judge in-loop as a day-one safety reflex (escalate on a bad answer, not just an error), log every routing decision as a DRACO-shaped RVF corpus, route per-category first, then auto-graduate to a per-question learned router via ruflo's SelfEvolvingRouter promotion gate. v2 tier schema, metaharness comparison, and a Rust gateway sidecar are committed, gated follow-on phases."
spec: "docs/research/routing-refactor-decisions.md — decisions D1–D6 (one brain = ruflo; Node/.mjs runtime; safe reflex first; per-category→per-question via automated promotion gate; log embeddings day one; v1 now / v2 at promotion). Scope is a THIS-REPO OVERLAY: Node/.mjs modules + config + ruflo enablement — NOT upstream ruflo TypeScript patches. Rust only in Phase 8."

# Design corpus autopilot reads before/while building. Each phase reads only its slice.
references:
  prd:     "docs/research/local-first-escalation-vision.md"      # the plain-language why + component map + the loop diagram
  plan:    "docs/research/routing-refactor-decisions.md"          # D1–D6 decision record (the authoritative decisions)
  adr_dir: ""                                                     # no formal ADR dir in this kit
  ddd_dir: ""                                                     # no DDD dir in this kit
  extra:
    - "docs/guide/reference/architecture-rfc.md"                  # 5-path decision, §8 observability/schema, share-governor + budget-gate seams
    - "docs/guide/reference/limitations-and-mitigations.md"       # the guided-router §12 gaps this loop closes (esp. §3 in-band quality)
    - "docs/guide/reference/tiers-and-routing.md"                 # CLAUDE_FLOW_ROUTER_* env surface, tier aliases, neural-router activation
    - "docs/research/metaharness-and-ruflo-local.md"              # metaharness compose, the two-learners caveat (Phase 7)
    - "router-policy.example.json"                                # tier floors + non-length features (per-category signal)
    - "ruflo-tiers.json"                                          # v1 per-tier alts (must stay v1 through Phase 5)
    - "scripts/verify-escalate.sh"                                # the bash judge Phase 1 ports to .mjs (behavior-preserving)
    - "scripts/budget-snapshot.sh"                                # the budget→steering snapshot Phase 1 ports + Phase 4 consumes
    - "tests/quality-prompts.jsonl"                               # the labeled corpus that seeds the learner + parity tests

# Branch model. trunk is NEVER auto-merged — a human merges the final PR.
trunk: main
base:  autopilot/local-first-learned-routing   # the experimental integration branch this work lands on

autonomy: reviewed          # implement one phase, commit a `gate PASSED` marker, STOP for inspection
fix_budget: 5

# Phases with real behavioral blast radius get the heavier adversarial review:
# 0 (runtime/MCP/config change + session restart), 2 (executes escalation on live responses),
# 5 (auto-promotes a router that then serves traffic), 8 (a new gateway that fronts LiteLLM).
risk_phases: [0, 2, 5, 8]

# ─────────────────────────────────────────────────────────────────────────────
# GENERATED by autopilot:plan — edit freely
# ─────────────────────────────────────────────────────────────────────────────
phases:
  # ── D1: make the upgrade real ────────────────────────────────────────────────
  - id: 0
    goal: "Make the ruflo upgrade actually take effect and capture a baseline: enable the ruflo MCP server, ensure the npx-resolved binary is >=3.18.1 (the #2549 fix, in @claude-flow/cli, which ruflo wraps), confirm ruflo's neural training backend reports available, and snapshot current routing behavior."
    deliverables:
      - ".claude/settings.json: add \"ruflo\" to enabledMcpjsonServers (pin already ruflo@3.21.1) so the fixed router is actually invocable."
      - "A refresh of the stale ~/.npm/_npx ruflo/claude-flow cache so >=3.21.1 resolves (documented as a manual step; the SESSION RESTART needed for the MCP change to load is flagged for the operator)."
      - "A baseline snapshot .autopilot/baseline/route-baseline.json (current tier shares + p50/p95 from bench-gateway)."
    definition_of_done:
      - "cmd: jq -e '.enabledMcpjsonServers | index(\"ruflo\") != null' .claude/settings.json >/dev/null  — ruflo MCP server enabled"
      - "cmd: jq -e '[.mcpServers.ruflo.args[] | select(test(\"^ruflo@3\\\\.(1[89]|[2-9][0-9])\"))] | length > 0' .claude/settings.json >/dev/null  — pin is >=3.18.x (the #2549 fix floor)"
      - "cmd: npx -y ruflo@3.21.1 --version  — the target ruflo actually resolves/downloads (no stale-cache failure)"
      - "cmd: test -f .autopilot/baseline/route-baseline.json && jq -e '.tier_shares and .latency' .autopilot/baseline/route-baseline.json >/dev/null  — baseline captured"
      - "prose: `npx ruflo@3.21.1 neural status` reports the native training backend as available (NOT 'unavailable') — the #2549 fix is live; captured in the phase notes since the exact CLI string is environment-dependent."
    conventions: "Only enable the ruflo MCP server; do NOT disable agentic-qe. The session restart + npx cache refresh are operator steps that cannot be gated — record them in the phase notes and verify via the version/neural-status commands. Do not wire ruflo into the product request path yet — that is Phase 4."
    depends_on: []
    adrs:  []
    ddd:   []

  # ── D2: portable runtime ─────────────────────────────────────────────────────
  - id: 1
    goal: "Port the four reward/verify/budget bash scripts to portable Node/.mjs modules with NO behavior change, so the judge can run in-process and the toolchain stops depending on bash/jq/curl and POSIX shells."
    deliverables:
      - "scripts/lib/verify-escalate.mjs — the FrugalGPT judge: position-swap-averaged, rubric-anchored, fail-closed, injection-hardened; emits the same {score,threshold,decision,passes,method,note} JSON as the bash version."
      - "scripts/lib/budget-snapshot.mjs, scripts/lib/bench-gateway.mjs, scripts/lib/quality-regression.mjs — ports of the remaining scripts."
      - "scripts/lib/gateway-client.mjs (OpenAI-compatible fetch, no curl), scripts/lib/reward.mjs (quality+cost+latency → scalar), scripts/lib/config.mjs (the CLAUDE_FLOW_ROUTER_* / JUDGE_MODEL env surface)."
      - "Node built-in (node:test + node:assert/strict) unit tests under scripts/lib/__tests__/ with a mocked gateway (AAA; happy path + fail-closed + injection + private-lane)."
      - "Thin bash shims kept so existing callers/CI still resolve."
    definition_of_done:
      - "cmd: for f in scripts/lib/verify-escalate.mjs scripts/lib/budget-snapshot.mjs scripts/lib/bench-gateway.mjs scripts/lib/quality-regression.mjs scripts/lib/gateway-client.mjs scripts/lib/reward.mjs scripts/lib/config.mjs; do node --check \"$f\" || exit 1; done  — every module parses"
      - "cmd: node --test scripts/lib/__tests__/  — unit tests pass"
      - "cmd: node scripts/lib/verify-escalate.mjs --help  — prints usage, exits 0"
      - "grep: position-swap|swap-averaged|rubric in scripts/lib/verify-escalate.mjs  — judge-bias mitigation preserved"
      - "cmd: ! git grep -nE 'child_process|execSync|require\\(.child_process' -- scripts/lib/verify-escalate.mjs  — the judge does not shell out (pure node, portable)"
      - "grep:absent: TODO|FIXME in scripts/lib/"
    conventions: "Match the bash scripts' env-overridable knobs (GW/KEY/JUDGE_MODEL/VERIFY_THRESHOLD). Default JUDGE_MODEL to a LOCAL tier — FrugalGPT only wins if verification << generation. Modules degrade gracefully (skip, exit 0 with a notice) when no frontier key is configured, mirroring smoke-test.sh."
    depends_on: []
    adrs:  []
    ddd:   []

  # ── D3: correctness guarantee ────────────────────────────────────────────────
  - id: 2
    goal: "Wire the judge into the live loop as the safe reflex: on a local-tier response, score it and escalate to frontier only when the score is below the bar — the day-one fix for 'a confidently-wrong local answer is served'. Needs no embedding, no learning."
    deliverables:
      - "scripts/lib/reflex.mjs — verify-then-escalate wrapper on local-tier responses; returns the better answer; response-side only (the gateway stays dumb)."
      - "Node built-in (node:test) tests: known-bad local answer → escalates; good answer → kept; tier-private → NEVER escalates; reflex latency overhead recorded."
    definition_of_done:
      - "cmd: node --check scripts/lib/reflex.mjs"
      - "cmd: node --test scripts/lib/__tests__/reflex.test.mjs  — reflex behaviors pass (escalate-on-low, keep-on-high, private-never-escalate)"
      - "grep: tier-private in scripts/lib/reflex.mjs  — the privacy pin is enforced in the reflex path"
      - "grep:absent: TODO|FIXME in scripts/lib/reflex.mjs"
    conventions: "tier-private must never leave the box even on a low score — assert it with a dedicated test. Escalation targets frontier; the judge itself stays on the cheap/local tier. Keep the reflex a pure function of (response, score) so it is testable without live models."
    depends_on: [1]
    adrs:  []
    ddd:   []

  # ── D5: the no-backfill corpus ───────────────────────────────────────────────
  - id: 3
    goal: "Record every routing decision as a DRACO-shaped row — including the prompt embedding — into a ruvector RVF corpus, from day one while still routing per-category, so the per-question learner has training data with zero backfill when the gate wants it."
    deliverables:
      - "scripts/lib/recorder.mjs — embeds the prompt (ruflo ONNX / hooks_) and appends {prompt_hash, embedding, category, tier, judge_score, cost, latency, escalated} to .ruvector/routing-corpus.rvf."
      - "Node built-in (node:test) tests: a recorded row validates against the schema and includes a non-empty embedding; two records grow the store; the store reopens after a simulated restart."
    definition_of_done:
      - "cmd: node --check scripts/lib/recorder.mjs"
      - "cmd: node --test scripts/lib/__tests__/recorder.test.mjs  — append/schema/reopen tests pass"
      - "grep: embedding in scripts/lib/recorder.mjs  — the embedding is captured on the record path"
      - "prose: recording two requests increases the RVF vector count (rvf_status), proving the corpus is a real ruvector store, not a JSON stub — shown in the test output."
      - "grep:absent: TODO|FIXME in scripts/lib/recorder.mjs"
    conventions: "Store to an actual .rvf via the ruvector RVF API (crash-safe, single-writer) — not an ad-hoc JSON file. Never store raw prompt text if it could contain secrets; store a prompt_hash + the embedding. The recorder runs on EVERY request regardless of routing grain (this is what makes per-category-first non-throwaway)."
    depends_on: [1]
    adrs:  []
    ddd:   []

  # ── D4a: the champion ────────────────────────────────────────────────────────
  - id: 4
    goal: "Route per-category as the champion and make budget STEER the decision (not just alert): honor per-agent-type/task-class tier floors, feed the budget snapshot into route(), and invoke ruflo's router in the product path — all on tier-schema v1."
    deliverables:
      - "scripts/lib/router.mjs — the per-category champion: picks a tier by task class/agent type honoring router-policy.example.json tier floors, with budget-snapshot.mjs demoting frontier per the utilization rungs; invokes ruflo route() in the product path (the Phase-0-deferred wiring)."
      - "Node built-in (node:test) tests: tier floors are never violated; rising budget utilization demotes then masks frontier per the rungs; tier-private is never demoted off-box."
    definition_of_done:
      - "cmd: jq -e '._meta.schema_version == 1' ruflo-tiers.json  — v1 invariant still holds through the champion phase"
      - "cmd: node --check scripts/lib/router.mjs"
      - "cmd: node --test scripts/lib/__tests__/router.test.mjs  — floor + budget-demotion tests pass"
      - "grep: tier_floor|tier-floor in router-policy.example.json  — per-category floors are the routing signal"
      - "grep: budget in scripts/lib/router.mjs  — budget is an input to the decision, not just an alert"
      - "grep:absent: TODO|FIXME in scripts/lib/router.mjs"
    conventions: "Stay on ruflo-tiers.json v1 (no per-request locality yet). The router may score a request DOWN but never below its agent-type floor. Frontier share should trend toward the ~10% target but is not hard-gated here (that is measured, not asserted, at this phase)."
    depends_on: [1, 2, 3]
    adrs:  []
    ddd:   []

  # ── D4b: the automated coarse→fine switch ────────────────────────────────────
  - id: 5
    goal: "Add the per-question learned router as a shadow challenger and an evidence-gated promotion: train a KRR TrainedRouter on the corpus, run it in shadow (never serving), and auto-promote it over the champion only when it beats it on quality-per-dollar by a real, sustained margin — with auto-rollback on regression. This is ruflo's SelfEvolvingRouter pattern."
    deliverables:
      - "scripts/lib/train-router.mjs — trains a KRR TrainedRouter (portable JSON) on .ruvector/routing-corpus.rvf, seeded from tests/quality-prompts.jsonl → .ruvector/router-model.json."
      - "scripts/lib/challenger.mjs — runs the trained router in shadow via ruflo's router-parallel-recorder (records the would-pick decision without serving it)."
      - "scripts/lib/promotion-gate.mjs — champion/challenger gate: promotes only when challenger q/$ beats champion by a configurable margin over >=N samples across a rolling window with a CI lower-bound; auto-rolls-back a promoted router that regresses."
      - "Node built-in (node:test) tests: offline replay reports challenger vs champion vs per-question oracle; the gate does NOT promote on thin/insufficient data; an injected regression triggers rollback."
    definition_of_done:
      - "cmd: for f in scripts/lib/train-router.mjs scripts/lib/challenger.mjs scripts/lib/promotion-gate.mjs; do node --check \"$f\" || exit 1; done"
      - "cmd: node scripts/lib/train-router.mjs --seed tests/quality-prompts.jsonl --out .ruvector/router-model.json && jq -e '.candidates and .alpha' .ruvector/router-model.json >/dev/null  — a portable trained-router artifact is produced"
      - "cmd: node --test scripts/lib/__tests__/promotion.test.mjs  — replay + no-promote-on-thin-data + regression-rollback tests pass"
      - "grep: rollback in scripts/lib/promotion-gate.mjs  — auto-rollback path present"
      - "grep: shadow in scripts/lib/challenger.mjs  — the challenger never serves traffic"
      - "grep:absent: TODO|FIXME in scripts/lib/train-router.mjs scripts/lib/challenger.mjs scripts/lib/promotion-gate.mjs"
    conventions: "The challenger MUST run in shadow only until promoted — assert it in a test. Promotion thresholds (min samples/candidate, q/$ margin, window, CI bound) are config, defaulted conservative. The champion remains the fallback after a promotion; rollback restores it. Honest guardrail: on a tiny corpus the challenger will tie, not beat, the champion (the DRACO n≈20 ceiling) — the gate simply won't promote, and that's correct."
    depends_on: [4]
    adrs:  []
    ddd:   []

  # ── D6: per-request locality (gated on promotion) ────────────────────────────
  - id: 6
    goal: "Adopt tier-schema v2 so the promoted per-question router can pick local-vs-frontier per request (not just per tier alias): migrate ruflo-tiers.json to v2 with per-request locality/base_url and flip the invariant check. Gated to run after Phase 5 promotion."
    deliverables:
      - "ruflo-tiers.json migrated to schema v2 (per-request locality + base_url), preserving the four-tier vocabulary and the tier-private no-fallback pin."
      - "The v1 schema-invariant check updated to v2 across the pipeline/profile; docs/guide/reference/tiers-and-routing.md updated for the v2 shape."
    definition_of_done:
      - "cmd: jq -e '._meta.schema_version == 2' ruflo-tiers.json  — v2 adopted"
      - "cmd: jq -e '[.. | objects | select(has(\"locality\"))] | length > 0' ruflo-tiers.json  — per-request locality present"
      - "cmd: jq -e . ruflo-tiers.json >/dev/null  — still valid JSON"
      - "grep: locality in docs/guide/reference/tiers-and-routing.md  — v2 documented"
      - "cmd: docker compose config -q  — the stack still assembles"
    conventions: "Do NOT break the four-tier alias vocabulary or the tier-private local-only guarantee. This phase runs only once Phase 5 has actually promoted a per-question router (the gated follow-on)."
    depends_on: [5]
    adrs:  []
    ddd:   []

  # ── Alternate-brain evaluation (committed) ───────────────────────────────────
  - id: 7
    goal: "Evaluate @metaharness/router's cost-optimal selector as an OFFLINE comparator against the promoted ruflo router on the same corpus, and record an honest adopt/keep decision — never run two learners live at once."
    deliverables:
      - "scripts/lib/metaharness-eval.mjs — trains/loads @metaharness/router on the corpus and scores it head-to-head vs the promoted ruflo router and the per-question oracle on a held-out split."
      - ".autopilot/reports/metaharness-vs-ruflo.json — the comparison (quality, cost, q/$, % oracle, CI) plus a documented adopt/keep recommendation."
      - "A decision note appended to docs/research/routing-refactor-decisions.md (Phase 7 outcome)."
    definition_of_done:
      - "cmd: node --check scripts/lib/metaharness-eval.mjs"
      - "cmd: node scripts/lib/metaharness-eval.mjs --corpus .ruvector/routing-corpus.rvf --out .autopilot/reports/metaharness-vs-ruflo.json && jq -e '.ruflo and .metaharness and .oracle' .autopilot/reports/metaharness-vs-ruflo.json >/dev/null  — three-way head-to-head produced"
      - "grep: adopt|keep in .autopilot/reports/metaharness-vs-ruflo.json  — an explicit recommendation is recorded"
      - "grep: Phase 7 in docs/research/routing-refactor-decisions.md  — the outcome is written back to the decision record"
    conventions: "This is an OFFLINE evaluation on the committed corpus — it does not put a second learner on the live path. If (and only if) metaharness wins on the held-out split, adoption also DISABLES ruflo's learner to avoid two-brain label blur (per metaharness-and-ruflo-local.md)."
    depends_on: [5]
    adrs:  []
    ddd:   []

  # ── Performance end-state (committed) ────────────────────────────────────────
  - id: 8
    goal: "Promote the proven routing loop into a standalone Rust ruvector-gateway sidecar (tiny-dancer FastGRNN + HNSW + budget ledger + OTel) that fronts LiteLLM — the Path-4 performance end-state — verified to make the SAME decisions as the Node loop at sub-5ms/25ms routing latency."
    deliverables:
      - "A Rust ruvector-gateway crate (its own dir, e.g. gateway/) embedding the promoted router, budget ledger, and OTel export, exposing the OpenAI-compatible :4000 seam behind a compose profile."
      - "A parity harness replaying the corpus through both the Node loop and the sidecar and asserting identical tier decisions; a latency bench (p50/p95)."
      - "docs/guide/reference/gateway-variants.md: a ruvector-gateway section + when-to-pick-which vs litellm/bifrost/helicone."
    definition_of_done:
      - "cmd: test -f gateway/Cargo.toml  — the sidecar crate exists"
      - "cmd: cargo build --release --manifest-path gateway/Cargo.toml  — the sidecar builds (no || true; must actually pass)"
      - "cmd: cargo test --manifest-path gateway/Cargo.toml  — parity + unit tests pass"
      - "grep: ruvector-gateway in docs/guide/reference/gateway-variants.md  — documented in the variants guide"
      - "prose: the sidecar's p95 routing latency is <5ms (heuristic) / <25ms (neural incl. embedding) on the bench, and its tier decisions match the Node loop on the replay set — shown in the bench/parity output."
      - "grep:absent: TODO|FIXME|unimplemented!|todo!() in gateway/src/"
    conventions: "Reuse the compose-profile selector from the guided-router-mitigations work — the ruvector-gateway is another mutually-exclusive :4000 gateway, not a second bind. The four-tier vocabulary + tier-private no-fallback pin are inviolable. This is the ONLY phase permitted to introduce Rust."
    depends_on: [5, 6]
    adrs:  []
    ddd:   []
