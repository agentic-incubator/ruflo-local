# pipeline.yml — autopilot feature pipeline for ruflo-local.
# Feature: local-first learned routing — turn the dormant local-first escalation design into a
# working, self-improving loop (one brain = ruflo's, judge wired in as a day-one reflex,
# per-category routing that auto-graduates to per-question via an evidence-gated promotion).
# Generated by autopilot:plan on 2026-07-04. Replaces the completed guided-router-mitigations
# pipeline (retired to git history + .autopilot/runs/guided-router-mitigations.jsonl). Edit freely.

# ─────────────────────────────────────────────────────────────────────────────
# YOU SUPPLY THIS
# ─────────────────────────────────────────────────────────────────────────────
feature_id: "local-first-learned-routing"
goal: "Stand up the local-first learned-routing loop: make the ruflo upgrade real, port the reward/verify/budget bash scripts to portable Node/.mjs, wire the quality judge in-loop as a day-one safety reflex (escalate on a bad answer, not just an error), log every routing decision as a DRACO-shaped RVF corpus, route per-category first, then auto-graduate to a per-question learned router via ruflo's SelfEvolvingRouter promotion gate. COMPLETE at phases 0–10 (2026-07-05); the forward-compatible locality (7), promotion proofs (8), real negatives (9), and the ruflo-3.25.1 + metaharness eval (10) all shipped. The Rust gateway sidecar and corpus-durability backup were split into their own standalone plans under .autopilot/queued/ (see the split note below the phases)."
spec: "docs/research/routing-refactor-decisions.md — decisions D1–D6 (one brain = ruflo; Node/.mjs runtime; safe reflex first; per-category→per-question via automated promotion gate; log embeddings day one; v1 now / v2 at promotion). Scope is a THIS-REPO OVERLAY: Node/.mjs modules + config + ruflo enablement — NOT upstream ruflo TypeScript patches. Rust is out of this pipeline's scope — split to the ruvector-gateway queued plan."

# Design corpus autopilot reads before/while building. Each phase reads only its slice.
references:
  prd:     "docs/research/local-first-escalation-vision.md"      # the plain-language why + component map + the loop diagram
  plan:    "docs/research/routing-refactor-decisions.md"          # D1–D6 decision record (the authoritative decisions)
  adr_dir: ""                                                     # no formal ADR dir in this kit
  ddd_dir: ""                                                     # no DDD dir in this kit
  extra:
    - "docs/guide/reference/architecture-rfc.md"                  # 5-path decision, §8 observability/schema, share-governor + budget-gate seams
    - "docs/guide/reference/limitations-and-mitigations.md"       # the guided-router §12 gaps this loop closes (esp. §3 in-band quality)
    - "docs/guide/reference/tiers-and-routing.md"                 # CLAUDE_FLOW_ROUTER_* env surface, tier aliases, neural-router activation
    - "docs/research/metaharness-and-ruflo-local.md"              # metaharness compose, the two-learners caveat (Phase 7)
    - "config/routing/router-policy.example.json"                                # tier floors + non-length features (per-category signal)
    - "config/routing/ruflo-tiers.json"                                          # v1 per-tier alts (must stay v1 through Phase 5)
    - "scripts/verify-escalate.sh"                                # the bash judge Phase 1 ports to .mjs (behavior-preserving)
    - "scripts/budget-snapshot.sh"                                # the budget→steering snapshot Phase 1 ports + Phase 4 consumes
    - "tests/quality-prompts.jsonl"                               # the labeled corpus that seeds the learner + parity tests

# Branch model. trunk is NEVER auto-merged — a human merges the final PR.
trunk: main
base:  develop              # integration branch — autopilot phase PRs (pr_ci) target this; the final develop→main (trunk) PR is human-merged

autonomy: pr_ci             # each phase → its own feature branch → PR into base (develop) → squash-merge on GREEN required CI; when all phases land, one develop→main PR (human-merged).
                            # REQUIRES base-scoped CI on PRs into develop (.github/workflows/*). Run `autopilot:detect` next session — it will offer to scaffold the gate workflow.
                            # CAVEAT: this kit's live gate (Ollama-backed gateway smoke test) CANNOT run on hosted GitHub runners (no local models), so CI gates STATIC checks only (lint + `docker compose config` + node --test). Live tier-serving stays a local check.
fix_budget: 5

# Phases with real behavioral blast radius get the heavier adversarial review:
# 0 (runtime/MCP/config change + session restart), 2 (executes escalation on live responses),
# 5 (auto-promotes a router that then serves traffic), 8 (a new gateway that fronts LiteLLM).
risk_phases: [0, 2, 5, 8, 10]   # phases 11 (Rust gateway) + 12 (backup) split out to .autopilot/queued/ on 2026-07-05; this pipeline is complete at 0–10

