# pipeline.yml — QUEUED autopilot plan (parked; promote to run).
# Grew out of a 2026-07-05 code audit of `docs/research/ruvector-gateway-rationale.md`: its §2
# diagram and Layer-2 table depict router.mjs/reflex.mjs/recorder.mjs as live per-request hot-path
# code, but every one of those modules' own STATUS headers says the opposite — "reference/overlay
# code... NOT in the live request path." Ten autopilot phases (the `local-first-learned-routing`
# pipeline, complete 0-10) built and unit-tested a full decision engine that has never once run
# against a real request. This plan is the missing cutover: a thin, always-on Node gateway that
# actually fronts whichever :4000 provider is active, wiring the PROVEN modules into the REAL
# request path — with visual (Grafana) and scripted (smoke-test) proof it is actually happening.
#
# Prerequisite: the shipped `local-first-learned-routing` pipeline (phases 0-10, complete 2026-07-05)
# — router.mjs, reflex.mjs, recorder.mjs, budget-snapshot.mjs already exist and are unit-tested.
# This plan does not change their logic; it calls them from a live process for the first time.
# Independent of `ruvector-gateway` (Rust, Path 4 — this plan is its honest prerequisite: that
# plan's own goal text says "promote the PROVEN Node routing loop," which isn't true until this
# ships) and independent of `corpus-durability` (backup/rotation of the same corpus).
#
# To run: promote this file to the active .autopilot/pipeline.yml when no other pipeline is in
# flight (see docs/lifecycle.md → promote), then drive `autopilot:run-phase` / `autopilot:orchestrate`.

feature_id: "live-routing-cutover"
goal: "Wire the proven-in-tests Node routing loop (router.mjs, reflex.mjs, recorder.mjs) into the ACTUAL live request path via a new always-on Node gateway that transparently fronts whichever :4000 serving substrate is active (litellm/bifrost/helicone), so the design can be traced and proven at runtime — with OTel spans, a Grafana dashboard, and live smoke-test assertions as the proof — instead of asserted only in docs."
spec: "docs/research/live-routing-gateway-rationale.md (why + before/after request-path diagrams + component map). Grounded: scripts/lib/router.mjs, reflex.mjs, recorder.mjs, budget-snapshot.mjs headers (STATUS: reference/overlay, not live — this plan is what makes that header false, then corrects it); config/gateways/litellm-config.yaml (today's actual live mechanism: static fallbacks + hard-stop budgets); docker-compose.yml (litellm/bifrost/helicone's mutually-exclusive :4000 bind, to be moved internal-only); config/observability/otel-collector-config.yaml (the spanmetrics connector this plan adds routing dimensions to). Scope: Node only, no Rust (that is the separate ruvector-gateway plan). This is the ONLY phase-set permitted to change docker-compose.yml's host :4000 port ownership."

references:
  prd:     "docs/research/local-first-escalation-vision.md"
  plan:    "docs/research/routing-refactor-decisions.md"
  adr_dir: ""
  ddd_dir: ""
  extra:
    - "docs/research/live-routing-gateway-rationale.md"             # why + with/without diagrams + component map
    - "docs/research/ruvector-gateway-rationale.md"                 # the Rust Path-4 plan this one is the honest prerequisite for
    - "docs/guide/reference/tiers-and-routing.md"                   # the tier vocabulary + the privacy-pin caveat this plan resolves
    - "scripts/lib/router.mjs"                                      # the champion this plan calls live (unchanged logic)
    - "scripts/lib/reflex.mjs"                                      # the safe reflex this plan calls live (unchanged logic)
    - "scripts/lib/recorder.mjs"                                    # the corpus recorder this plan calls live (unchanged logic)
    - "config/gateways/litellm-config.yaml"                         # today's static fallbacks/budgets — what this plan sits in front of
    - "config/observability/otel-collector-config.yaml"             # the spanmetrics connector this plan extends with routing dimensions
    - "config/observability/grafana-datasources.yml"                # the datasource the new dashboard reads from

trunk: main
base:  develop
autonomy: pr_ci             # mirror the parent pipeline. CAVEAT: the live Ollama-backed gateway
                            # smoke can't run on hosted CI — CI gates STATIC checks (lint, docker
                            # compose config, node --test); live tier-serving + Grafana screenshot
                            # stay a local check, same caveat as the parent pipeline.
fix_budget: 5

# Phases with real behavioral blast radius: 0 (a new service claims host :4000 for the first
# time — every request in the stack now flows through new code), 2 (the judge/escalation path,
# where the fail-closed privacy pin must survive contact with a live process, not just a test).
risk_phases: [0, 2]

phases:
  # ── Foundational seam: transparent proxy, zero decision logic yet ───────────────────────────
  - id: 0
    goal: "Stand up route-gateway as an always-on Node HTTP server that transparently fronts whichever :4000 serving substrate is active (litellm/bifrost/helicone), with ZERO behavior change: pure passthrough proxy first, proving the seam before any routing/judge/recording logic is added. litellm/bifrost/helicone move to internal-only ports; route-gateway claims host :4000 uniformly across all three profiles."
    deliverables:
      - "scripts/gateway-server.mjs — a Node http(s) server on :4000 that proxies every request verbatim to GATEWAY_UPSTREAM_URL (default http://litellm:4000; override to http://bifrost:8080 / http://helicone:8080 per active profile), preserving method/headers/body/streaming, byte-for-byte passthrough."
      - "docker-compose.yml: a new `route-gateway` service (no profiles: — always on, like otel-collector), binding host \"4000:4000\"; litellm/bifrost/helicone lose their host `4000:...` mapping (container-network-only), uniformly across all three — not just litellm."
      - "A parity check: every existing smoke-test.sh assertion still passes unmodified, proving the passthrough is byte-identical to calling litellm/bifrost/helicone directly."
    definition_of_done:
      - "cmd: node --check scripts/gateway-server.mjs"
      - "cmd: docker compose config  — the compose file still parses with the new service + port changes"
      - "cmd: ! grep -n '\"4000:' docker-compose.yml | grep -E 'litellm|bifrost|helicone'  — none of the three providers bind host :4000 anymore"
      - "cmd: grep -n 'route-gateway' docker-compose.yml  — the new service is defined"
      - "cmd: ./smoke-test.sh  — every existing assertion (tier answers, fall-through, privacy pin, metrics) still passes unmodified, through the new proxy"
      - "grep:absent: TODO|FIXME in scripts/gateway-server.mjs"
    conventions: "This phase adds NO decision logic — pure proxy, byte-for-byte passthrough, to isolate 'does the new seam work' from 'does the new logic work.' GATEWAY_UPSTREAM_URL follows the existing OLLAMA_API_BASE/VLLM_API_BASE env-override convention. Never bind :4000 from more than one container at once."
    depends_on: []
    adrs:  []
    ddd:   []

  # ── Wire the per-category champion live ─────────────────────────────────────────────────────
  - id: 1
    goal: "Wire router.mjs's route() into the live proxy: an incoming request with metadata.agentType gets category-floor + budget-steered tier selection; a request with an explicit tier alias in `model` (including tier-private) bypasses routing entirely — unchanged passthrough, preserving the privacy pin's fail-closed short-circuit ahead of any routing logic."
    deliverables:
      - "scripts/gateway-server.mjs: parse metadata.agentType from the request body; call router.mjs's route() (unchanged) to resolve a tier; rewrite `model` to the resolved tier before forwarding. An explicit tier in `model` (any of tier-fast/heavy/frontier/private) skips route() entirely."
      - "Node built-in tests: agentType→tier resolution happens; explicit-tier requests bypass routing untouched; a router.mjs throw degrades to forwarding the client's original `model` (fail OPEN on the decision, never fail closed on the routing step)."
    definition_of_done:
      - "cmd: node --check scripts/gateway-server.mjs"
      - "cmd: node --test scripts/__tests__/gateway-server.test.mjs  — agentType routing, explicit-tier bypass, and router-throw-degrades-gracefully tests pass"
      - "grep: pinnedPrivate|tier-private in scripts/gateway-server.mjs  — the privacy short-circuit is checked BEFORE router.mjs is ever called"
      - "grep:absent: TODO|FIXME in scripts/gateway-server.mjs"
    conventions: "router.mjs's own logic is NOT modified — only called, for the first time, from live code. The explicit-tier bypass must be checked first, unconditionally, so a caller who already knows its tier is never subject to routing overhead or a routing bug. Fail OPEN on router.mjs errors (serve the originally-requested tier); fail CLOSED on privacy (the bypass check itself never has a failure mode that reaches routing)."
    depends_on: [0]
    adrs:  []
    ddd:   []

  # ── Wire the safe reflex live — the highest-stakes phase ────────────────────────────────────
  - id: 2
    goal: "Wire reflex.mjs into the live response path: a scorable-tier (tier-fast/tier-heavy) answer gets judged and escalated to tier-frontier on a low score. Prove — through the LIVE gateway, not just unit tests — that tier-private (and every non-scorable tier) NEVER reaches the judge or leaves the box, end to end."
    deliverables:
      - "scripts/gateway-server.mjs: after a scorable-tier response, call reflex.mjs's reflex() (unchanged) and return its answer (possibly escalated) instead of the raw local response."
      - "A live (not just unit-test) assertion: a request served by tier-private, run through the real route-gateway process with a real (mocked-bad) judge available, produces zero outbound calls to the judge/frontier — verified by intercepting/counting calls at the gateway's egress, not by asserting on reflex.mjs in isolation."
    definition_of_done:
      - "cmd: node --check scripts/gateway-server.mjs"
      - "cmd: node --test scripts/__tests__/gateway-server-reflex.test.mjs  — escalate-on-low-score, keep-on-high-score, and tier-private-zero-egress-calls tests pass against the live server (supertest-style, not mocked reflex.mjs internals)"
      - "grep: reflex in scripts/gateway-server.mjs  — reflex.mjs is actually invoked from the live path"
      - "grep:absent: TODO|FIXME in scripts/gateway-server.mjs"
      - "prose: the tier-private live-egress-count assertion is the phase's centerpiece evidence — cite the actual test run output, not just 'tests pass,' in the phase evidence file (mirrors the rigor of the parent pipeline's phase 2)."
    conventions: "This phase carries real behavioral blast radius — a bug here either silently ships private data off-box or silently stops escalating bad answers. Prove the privacy pin against the ACTUAL LIVE PROCESS, matching this plan's whole premise: unit tests already proved reflex.mjs correct in isolation; this phase must prove it correct when actually running."
    depends_on: [1]
    adrs:  []
    ddd:   []

  # ── Wire the corpus recorder live ───────────────────────────────────────────────────────────
  - id: 3
    goal: "Wire recorder.mjs into the live path: every request (including reflex escalations, as a negative/positive per D11) gets a real DRACO row logged asynchronously, never blocking the response."
    deliverables:
      - "scripts/gateway-server.mjs: after responding to the client, call recorder.mjs's record path (unchanged) fire-and-forget with the real embedding, tier, judge_score, cost, latency, escalated, and REAL success/failure outcome."
      - "A live corpus-growth check: N real requests through route-gateway → the corpus (.ruvector/routing-corpus.rvf or its JSONL fallback) grows by exactly N rows, each with a real (non-stub) embedding."
    definition_of_done:
      - "cmd: node --check scripts/gateway-server.mjs"
      - "cmd: node --test scripts/__tests__/gateway-server-recorder.test.mjs  — async fire-and-forget (response not blocked on recorder), corpus-growth-by-N, and real-embedding (RUFLO_REQUIRE_REAL_EMBEDDINGS=1 never throws in the live path) tests pass"
      - "grep: recorder in scripts/gateway-server.mjs  — recorder.mjs is actually invoked from the live path"
      - "grep:absent: TODO|FIXME in scripts/gateway-server.mjs"
    conventions: "Recording is fire-and-forget: a recorder.mjs throw must never affect the client-visible response or its latency. This is the module that finally gives the per-question learner (already trained offline against a synthetic/seed corpus) REAL live-traffic data to eventually promote against."
    depends_on: [1, 2]
    adrs:  []
    ddd:   []

  # ── Observability: spans + Prometheus dimensions ────────────────────────────────────────────
  - id: 4
    goal: "Emit an OTel span per gateway decision carrying ruflo.route.{tier,floor,category,budget_rung,escalated,judge_score} attributes alongside the existing gen_ai.* spans, and extend the collector's spanmetrics connector so these become Prometheus-queryable dimensions — the machine-readable half of 'prove it's happening at runtime.'"
    deliverables:
      - "scripts/gateway-server.mjs: an OTel span per request with the ruflo.route.* attributes, exported to the existing otel-collector (same OTEL_ENDPOINT convention as litellm-config.yaml)."
      - "config/observability/otel-collector-config.yaml: add ruflo.route.tier / .escalated / .budget_rung to the spanmetrics connector's `dimensions`, so Prometheus gets them as labels without a second exporter."
    definition_of_done:
      - "cmd: node --check scripts/gateway-server.mjs"
      - "cmd: docker compose config  — collector config changes still parse"
      - "grep: ruflo.route in scripts/gateway-server.mjs  — the span attributes are emitted"
      - "grep: ruflo.route in config/observability/otel-collector-config.yaml  — the connector dimensions are extended"
      - "prose: a live request's span is visible in the collector's debug exporter output (or a Prometheus query against the new dimension) — cite the actual query/output in phase evidence, not just 'spans configured.'"
    conventions: "Reuse the existing otlp_http → spanmetrics → prometheus pipeline already proven by litellm's gen_ai spans (config/observability/otel-collector-config.yaml) — do not stand up a second collector or exporter."
    depends_on: [3]
    adrs:  []
    ddd:   []

  # ── Visual proof: a Grafana dashboard ───────────────────────────────────────────────────────
  - id: 5
    goal: "Give the routing decision loop a Grafana dashboard — the graphical proof: tier-share over time, escalation rate, budget-demotion rungs, DRACO corpus growth rate, and judge-score distribution, all reading from the Prometheus dimensions phase 4 added. Auto-provisioned (no manual click-ops), matching the existing datasource-provisioning convention."
    deliverables:
      - "config/observability/dashboards/routing-decisions.json — a Grafana dashboard: (1) tier-share-over-time (stacked area, by ruflo_route_tier), (2) escalation-rate (rate of ruflo.route.escalated=true), (3) budget-demotion-rungs (current rung + history), (4) DRACO-corpus-growth-rate (rows/hour), (5) judge-score distribution (histogram)."
      - "config/observability/grafana-dashboards-provisioning.yml — a dashboards provisioning pointer (apiVersion 1, a file-based provider), mirroring grafana-datasources.yml's pattern."
      - "docker-compose.yml: mount both the provisioning pointer and the dashboards/ dir into the grafana service (alongside the existing datasources mount)."
    definition_of_done:
      - "cmd: docker compose config  — the new volume mounts parse"
      - "cmd: test -f config/observability/dashboards/routing-decisions.json && jq -e '.panels | length >= 5' config/observability/dashboards/routing-decisions.json >/dev/null  — the five panels exist"
      - "cmd: test -f config/observability/grafana-dashboards-provisioning.yml"
      - "grep: routing-decisions in docker-compose.yml  — the dashboard is actually mounted into the grafana service"
      - "prose: a screenshot (or exported PNG) of the live dashboard, taken after running smoke-test.sh (phase 6) at least once so the panels have real data, attached as phase evidence — the graphical proof this whole plan exists to produce."
    conventions: "File-based provisioning only — no manual Grafana UI dashboard creation, so the dashboard survives a `docker compose down -v`. Panel queries reference the ruflo.route.* dimensions phase 4 added; do not invent new metric names not actually emitted by the collector."
    depends_on: [4]
    adrs:  []
    ddd:   []

  # ── Scripted proof: smoke-test.sh live assertions ───────────────────────────────────────────
  - id: 6
    goal: "Extend smoke-test.sh with assertions that actually exercise the live decision path end-to-end: a forced known-bad local answer escalates to frontier; a real DRACO row lands after a real call; tier-private never leaves the box through the live gateway. The scripted counterpart to phase 5's visual proof."
    deliverables:
      - "smoke-test.sh: a new section forcing a low-quality local answer (mock or a known-weak prompt) and asserting the response actually came from tier-frontier (escalated), not tier-fast."
      - "smoke-test.sh: a new section asserting the DRACO corpus row count increases by exactly 1 after a real call, with a real (non-zero-length, non-hash-stub) embedding."
      - "smoke-test.sh: re-assert the existing privacy-pin check, but now noting it passed THROUGH route-gateway (phase 0-2's new seam), not directly against litellm."
    definition_of_done:
      - "cmd: ./smoke-test.sh  — every assertion, old and new, passes against the live route-gateway"
      - "grep: escalat in smoke-test.sh  — the escalation drill is present"
      - "grep: corpus|draco in smoke-test.sh  — the corpus-growth check is present"
    conventions: "SMOKE_LOCAL_ONLY must still degrade the escalation drill gracefully (skip, don't fail) when no frontier key is configured, matching the existing tier-3 pattern in smoke-test.sh."
    depends_on: [5]
    adrs:  []
    ddd:   []

  # ── Correct the record: fix every doc that overclaimed runtime status ───────────────────────
  - id: 7
    goal: "Now that router.mjs/reflex.mjs/recorder.mjs actually run live, correct every doc and pipeline note that either understated it (their own STATUS headers, now stale) or previously OVERCLAIMED it before this plan shipped — so the docs finally match the code in both directions."
    deliverables:
      - "scripts/lib/router.mjs, reflex.mjs, recorder.mjs: update each STATUS header — no longer 'NOT in the live request path'; now 'live, called from scripts/gateway-server.mjs (see live-routing-gateway-rationale.md).'"
      - "docs/research/ruvector-gateway-rationale.md: correct §2's diagram/caption and the Layer-2 table so they describe the ACTUAL (now-live) request path from this plan, not an aspirational one."
      - "docs/guide/reference/tiers-and-routing.md:36: update the 'that overlay is reference code, not yet wired' caveat — it is wired now; cite this plan."
      - "docs/research/routing-refactor-decisions.md: mark the go-live gap closed with a decision-log entry referencing this plan."
      - ".autopilot/pipeline.yml (phase 7, lines ~181/193 of the shipped parent pipeline): correct the 'ALREADY enforced at runtime... correctly and tested' claim about router.mjs/reflex.mjs — it was false when written; true now; note the correction with a dated addendum rather than silently rewriting history."
    definition_of_done:
      - "grep:absent: NOT in the live request path in scripts/lib/router.mjs scripts/lib/reflex.mjs scripts/lib/recorder.mjs"
      - "grep: live-routing-cutover|gateway-server.mjs in docs/research/ruvector-gateway-rationale.md  — the correction cites this plan"
      - "grep: live-routing-cutover|gateway-server.mjs in docs/guide/reference/tiers-and-routing.md"
      - "prose: the .autopilot/pipeline.yml correction is an ADDENDUM (dated, explaining what was wrong and why), not a silent rewrite of the original phase-7 text — preserving the historical record of the mistake this whole audit started from."
    conventions: "This phase is documentation-only — no code changes. Its DoD is entirely grep/prose because its job is textual accuracy, not behavior. Do not soften the correction — state plainly that the prior text was wrong, per the audit that motivated this plan."
    depends_on: [6]
    adrs:  []
    ddd:   []
