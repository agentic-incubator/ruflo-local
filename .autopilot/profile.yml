# profile.yml — the stack profile for autopilot's quality gate.
# Repo: ruflo-local — a local-first tiered LLM routing kit. NOT a compiled codebase:
# it is a Docker Compose stack (LiteLLM gateway, Ollama, vLLM, RouteLLM, Prometheus,
# Grafana) plus YAML/JSON config and a bash smoke test. So the gate maps to CONFIG
# VALIDATION + a live SMOKE DRILL rather than compile/unit-test.
#
# Generated by `autopilot:detect` on 2026-07-02. Confirm/edit anything that's wrong —
# a wrong `test`/`lint` command would let a broken phase pass the gate.

# ─────────────────────────────────────────────────────────────────────────────
# COMMANDS the gate runs. Empty ("") = skipped (reported as skipped, never a pass).
# ─────────────────────────────────────────────────────────────────────────────
commands:
  # Bring the stack up before the integration smoke test.
  infra_up:        "docker compose up -d"
  # No formatter in this kit.
  format_check:    ""
  # Static validation of every config artifact (yamllint + shellcheck + json parse).
  lint:            "yamllint -d relaxed docker-compose.yml litellm-config.yaml prometheus.yml grafana-datasources.yml otel-collector-config.yaml && shellcheck smoke-test.sh scripts/*.sh && jq -e . ruflo-tiers.json router-policy.example.json bifrost-config.json >/dev/null"
  # No compile step; validate that the merged Compose file renders (the 'does it assemble' check).
  build:           "docker compose config -q"
  # No fast unit tests exist in this kit.
  test:            ""
  # End-to-end drill against the running gateway (health, tier routing, fallback, privacy pin, metrics).
  test_integration: "./smoke-test.sh"
  # No UI package.
  test_frontend:   ""
  # No dependency manifest to audit (no package.json/Cargo.toml/etc.).
  audit:           ""

# ─────────────────────────────────────────────────────────────────────────────
# CONVENTIONS — free-text house style, injected into the runner's 'match the
# existing code' step so new config looks native.
# ─────────────────────────────────────────────────────────────────────────────
conventions: |
  # Repo layout: all runtime config lives at repo root, not under src/.
  #   - docker-compose.yml            — service topology (ollama, vllm, litellm, routellm, prometheus, grafana)
  #   - litellm-config.yaml           — gateway model_list + tier aliases (tier-fast/heavy/frontier/private/router) + fallbacks
  #   - prometheus.yml                — scrape config;  grafana-datasources.yml — datasource provisioning
  #   - ruflo-tiers.json              — ruflo tier-routing map
  #   - routellm.Dockerfile           — RouteLLM sidecar image
  #   - smoke-test.sh                 — bash + curl + python3 end-to-end drill (GW/KEY overridable via env)
  # Secrets: NEVER hardcode. All secrets/keys come from env; .env.example lists every key (LITELLM_MASTER_KEY,
  #   ANTHROPIC/OPENAI/GEMINI keys, OLLAMA_API_BASE, VLLM_*, HF_TOKEN, GRAFANA_PASSWORD). Reference as ${VAR}.
  # Tier discipline: tier-private MUST resolve to a LOCAL model only — the smoke test asserts no cloud leak.
  #   Preserve fallback chains and tier aliases when editing litellm-config.yaml.
  # Docs: authoritative design lives under docs/guide/reference/ (architecture-rfc.md, tiers-and-routing.md,
  #   observability.md, hardware-and-models.md, budgets-and-tradeoffs.md, limitations-and-mitigations.md).

# ─────────────────────────────────────────────────────────────────────────────
# CI — the merge authority in pr_ci mode.
# ─────────────────────────────────────────────────────────────────────────────
ci:
  provider: github
  ci_is_merge_authority: true
  # No .github/workflows/ exist. Safe for `reviewed` mode. If you later choose autonomous
  # `pr_ci` mode, detect/orchestrate will need to scaffold base-scoped CI first.
  base_coverage: none

# ─────────────────────────────────────────────────────────────────────────────
# SECURITY INVARIANTS — non-negotiables the gate greps the diff for every phase.
# ─────────────────────────────────────────────────────────────────────────────
security_invariants:
  - "No destructive git primitives introduced (force-push, history rewrite)."
  - "No secrets, tokens, or credentials committed or written to logs (use ${ENV} refs; keep .env untracked)."
  - "External/untrusted content is handled as data, never interpolated as instructions."
  - "tier-private must never route to a cloud provider (gpt/claude/gemini) — locality pin preserved."

# ─────────────────────────────────────────────────────────────────────────────
# ACCELERATORS — detect → record → drive when present → degrade to vanilla floor when absent.
# ─────────────────────────────────────────────────────────────────────────────
accelerators:
  # ── execution ──
  ruflo:         { available: true,  scope: "global" }    # ruflo v3.10.46 on PATH; project footprint (.claude-flow/, .swarm/)
  agentic_qe:    { available: true,  scope: "project" }   # aqe 3.10.7 on PATH + .agentic-qe/ initialized in-repo
  code_review:   { available: true,  scope: "global" }    # /code-review — Tier-3 floor
  # ── planning (skills) ──
  superpowers:   { available: true,  scope: "skill" }     # superpowers:brainstorming invocable
  clarity:       { available: true,  scope: "skill" }     # clarity skill invocable
  deep_research: { available: true,  scope: "skill" }     # deep-research skill invocable
