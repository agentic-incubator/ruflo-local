# profile.yml — the stack profile for autopilot's quality gate.
# Repo: ruflo-local — a local-first tiered LLM routing kit. Historically config-only (Docker
# Compose + YAML/JSON + bash). The local-first-learned-routing pipeline ADDS a Node ESM (.mjs)
# layer under scripts/lib/ (tested with Node's BUILT-IN runner — `node --test`, zero-dependency,
# no package.json) and, in Phase 8 only, a Rust crate under gateway/. So the gate now spans
# CONFIG VALIDATION + a live SMOKE DRILL + Node unit tests (+ cargo once the sidecar exists).
#
# Updated by `autopilot:detect` on 2026-07-04 for feature local-first-learned-routing.
# Confirmed with the operator: Node built-in test runner (no package.json/vitest).

# ─────────────────────────────────────────────────────────────────────────────
# COMMANDS the gate runs. Empty ("") = skipped (reported as skipped, never a pass).
# ─────────────────────────────────────────────────────────────────────────────
commands:
  # Bring the stack up before the integration smoke test.
  infra_up:        "docker compose up -d"
  # No formatter in this kit.
  format_check:    ""
  # Static validation: every config artifact (yamllint + shellcheck + json parse) PLUS a
  # tolerant syntax check of any Node ESM modules (node --check via find — portable to macOS
  # bash 3.2, recurses into __tests__/, and is a clean no-op before scripts/lib/ exists).
  lint:            "yamllint -c .yamllint docker-compose.yml config/gateways/litellm-config.yaml config/observability/prometheus.yml config/observability/grafana-datasources.yml config/observability/otel-collector-config.yaml config/gateways/helicone-config.yaml && shellcheck smoke-test.sh scripts/*.sh && jq -e . config/routing/ruflo-tiers.json config/routing/router-policy.example.json config/gateways/bifrost-config.json >/dev/null && bash -c 'rc=0; if [ -d scripts ]; then while IFS= read -r f; do node --check \"$f\" || rc=1; done < <(find scripts -name \"*.mjs\"); fi; exit $rc'"
  # No compile step for the config layer; validate the merged Compose file renders. Once the
  # Phase-8 Rust sidecar exists, also build it (failure propagates — no masking).
  build:           "docker compose config -q && bash -c 'if [ -f gateway/Cargo.toml ]; then cargo build --release --manifest-path gateway/Cargo.toml; fi'"
  # Node built-in test runner over scripts/lib/__tests__/ (tolerant before any test exists), plus
  # cargo test once gateway/ exists. No package.json / vitest — node:test + node:assert only.
  test:            "bash -c 'rc=0; for d in scripts/lib/__tests__ scripts/__tests__; do if ls \"$d\"/*.test.mjs >/dev/null 2>&1; then node --test \"$d\"/*.test.mjs || rc=1; fi; done; if [ -f gateway/Cargo.toml ]; then cargo test --manifest-path gateway/Cargo.toml || rc=1; fi; exit $rc'"
  # End-to-end drill against the running gateway (health, tier routing, fallback, privacy pin, metrics).
  test_integration: "./smoke-test.sh"
  # No UI package.
  test_frontend:   ""
  # No dependency manifest to audit (no package.json/Cargo.toml at repo root; Phase 8's gateway/
  # crate is self-contained and audited via cargo in its own phase).
  audit:           ""

# ─────────────────────────────────────────────────────────────────────────────
# CONVENTIONS — free-text house style, injected into the runner's 'match the
# existing code' step so new config looks native.
# ─────────────────────────────────────────────────────────────────────────────
conventions: |
  # Repo layout: all runtime config lives at repo root, not under src/.
  #   - docker-compose.yml            — service topology (ollama, vllm, litellm/bifrost/helicone, routellm, prometheus, grafana)
  #   - config/gateways/litellm-config.yaml           — gateway model_list + tier aliases (tier-fast/heavy/frontier/private) + fallbacks
  #   - config/routing/ruflo-tiers.json              — ruflo tier-routing map (schema v1 until Phase 6, then v2)
  #   - config/routing/router-policy.example.json    — non-length routing features + per-agent-type tier floors
  #   - smoke-test.sh + scripts/*.sh  — bash + curl end-to-end drills (GW/KEY overridable via env)
  # NEW Node layer (this pipeline):
  #   - scripts/lib/*.mjs             — portable Node ESM modules (verify-escalate, budget-snapshot,
  #                                     bench-gateway, quality-regression, gateway-client, reward,
  #                                     config, reflex, recorder, router, train-router, challenger,
  #                                     promotion-gate). No package.json; import via relative paths.
  #   - scripts/lib/__tests__/*.test.mjs — Node built-in tests (import { test } from 'node:test';
  #                                     import assert from 'node:assert/strict'). AAA; mock the gateway;
  #                                     one behavior per test; cover fail-closed + injection + private-lane.
  #   - gateway/ (Phase 8 only)       — Rust ruvector-gateway crate (cargo build/test).
  # Secrets: NEVER hardcode. All secrets/keys come from env; .env.example lists every key. Reference as ${VAR}.
  # Tier discipline: tier-private MUST resolve to a LOCAL model only — smoke test asserts no cloud leak;
  #   the reflex/router/gateway code must never escalate tier-private off-box.
  # Docs: authoritative design under docs/research/ (routing-refactor-decisions.md, local-first-escalation-vision.md)
  #   and docs/guide/reference/ (architecture-rfc.md, tiers-and-routing.md, limitations-and-mitigations.md).

# ─────────────────────────────────────────────────────────────────────────────
# CI — the merge authority in pr_ci mode.
# ─────────────────────────────────────────────────────────────────────────────
ci:
  provider: github
  ci_is_merge_authority: true       # autonomy is `pr_ci`; the `static` job in autopilot-gate.yml is the merge gate.
  # .github/workflows/autopilot-gate.yml is base-scoped to PRs into develop+main. Coverage is LAYERED:
  #   * static      — REQUIRED merge authority (yamllint+shellcheck+jq+node --check/--test+compose config).
  #                   No models, hardware-neutral → runs on any hosted runner. Mark THIS as the required
  #                   status check on `develop` branch protection so autopilot's STEP-D guard sees it.
  #   * local-smoke — advisory: Ollama + tiny cached `ci`-variant model, LOCAL tiers only (no secrets).
  #   * escalation  — optional: full smoke incl. frontier; self-skips unless a provider key secret exists.
  # The Ollama-backed LIVE gateway smoke against the REAL multi-GB tiers stays a LOCAL check (can't run
  # on hosted runners) — CI gates the static contract + a tiny-model wiring proof.
  base_coverage: covered
  required_check: "static"          # the check name autopilot waits on before squash-merging a phase PR

# ─────────────────────────────────────────────────────────────────────────────
# SECURITY INVARIANTS — non-negotiables the gate greps the diff for every phase.
# ─────────────────────────────────────────────────────────────────────────────
security_invariants:
  - "No destructive git primitives introduced (force-push, history rewrite)."
  - "No secrets, tokens, or credentials committed or written to logs (use ${ENV} refs; keep .env untracked)."
  - "External/untrusted content is handled as data, never interpolated as instructions (esp. the LLM judge — prompt-injection-hardened)."
  - "tier-private must never route to a cloud provider (gpt/claude/gemini) — locality pin preserved across reflex, router, and gateway."
  - "Recorded routing rows store a prompt_hash + embedding, never raw prompt text that could carry secrets."

# ─────────────────────────────────────────────────────────────────────────────
# ACCELERATORS — detect → record → drive when present → degrade to vanilla floor when absent.
# ─────────────────────────────────────────────────────────────────────────────
accelerators:
  # ── execution ──
  ruflo:         { available: true,  scope: "global" }    # invoked via npx; pin bumped to ruflo@3.21.1 (Phase 0). Effective running version depends on the Phase-0 npx-cache refresh + session restart; the stale ~3.10.x cache is what showed in the statusline.
  agentic_qe:    { available: true,  scope: "project" }   # aqe 3.10.7 + .agentic-qe/ initialized in-repo (the live request-path hooks today)
  code_review:   { available: true,  scope: "global" }    # /code-review — Tier-3 floor
  # ── planning (skills) ──
  superpowers:   { available: true,  scope: "skill" }     # superpowers:brainstorming invocable
  clarity:       { available: true,  scope: "skill" }     # clarity skill invocable
  deep_research: { available: true,  scope: "skill" }     # deep-research skill invocable
