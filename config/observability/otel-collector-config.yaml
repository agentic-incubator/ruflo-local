# =============================================================================
# OpenTelemetry Collector — GenAI observability substrate (limitations §7)
# Receives OTLP spans from the LiteLLM gateway (gen_ai.* semantic conventions),
# derives metrics from them, and exposes those on :8889 for Prometheus to scrape.
# Docs: docs/guide/reference/observability.md → OpenTelemetry GenAI spans (§7).
# =============================================================================

receivers:
  # LiteLLM's "otel" callback ships spans here (OTEL_EXPORTER=otlp_http,
  # OTEL_ENDPOINT=http://otel-collector:4318/v1/traces — see docker-compose.yml; the
  # /v1/traces path is REQUIRED by LiteLLM's OTEL exporter).
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

connectors:
  # Turn GenAI spans into Prometheus-scrapable metrics, tagged by model/provider
  # using the OTel GenAI semantic-convention attributes.
  spanmetrics:
    namespace: gen_ai
    dimensions:
      - name: gen_ai.request.model
      # Provider attribute name is version-dependent: older LiteLLM / GenAI semconv
      # emits gen_ai.system, newer emits gen_ai.provider.name. Capture BOTH so the
      # provider label survives whichever your gateway version sends (absent = dropped).
      - name: gen_ai.system
      - name: gen_ai.provider.name
      - name: gen_ai.operation.name
      # Phase 5 (live-routing-cutover): route-gateway's own span per decision
      # (scripts/lib/otel-span.mjs) — the same connector, no second exporter. Only the
      # low-cardinality dimensions are promoted to metric labels; ruflo.route.floor/
      # .category/.judge_score stay span-only attributes (unbounded/continuous values
      # make poor Prometheus labels).
      - name: ruflo.route.tier
      - name: ruflo.route.escalated
      - name: ruflo.route.budget_rung

exporters:
  # Prometheus scrape target (prometheus.yml → job_name: otel-collector).
  prometheus:
    endpoint: 0.0.0.0:8889
  # Span visibility in the collector logs; swap for an OTLP/Jaeger/Tempo
  # exporter when you add a tracing backend.
  debug:
    verbosity: normal

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [spanmetrics, debug]
    metrics:
      receivers: [spanmetrics]
      processors: [batch]
      exporters: [prometheus]
