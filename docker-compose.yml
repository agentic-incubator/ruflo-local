# =============================================================================
# Local-First Tiered LLM Routing Kit
# Services: Ollama (local inference) + LiteLLM (gateway/budgets/fallbacks)
#           + Postgres (keys/budgets) + Prometheus + Grafana (observability)
# Optional profiles:
#   --profile gpu     → adds vLLM for high-throughput local serving (NVIDIA)
#   --profile router  → adds RouteLLM (learned 90/10 strong/weak router)
# See docs/guide/ for full instructions (start: getting-started-technical.md).
# =============================================================================

services:

  # --- Tier 1/2: local inference -------------------------------------------
  # NOTE (macOS/Windows): Docker cannot access Apple/consumer GPUs. Run Ollama
  # natively on the host instead, set OLLAMA_API_BASE=http://host.docker.internal:11434
  # in .env, and start with:  docker compose up --scale ollama=0
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    # Uncomment for NVIDIA GPUs (requires nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # --- Optional Tier-2 alternative: vLLM (NVIDIA GPU, high concurrency) -----
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm
    profiles: ["gpu"]
    ports:
      - "8000:8000"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    command: >
      --model ${VLLM_MODEL:-QuantTrio/Qwen3.6-27B-AWQ}
      --max-model-len ${VLLM_MAX_LEN:-16384}
    volumes:
      - hf_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # --- The gateway (DEFAULT): routing, fallbacks, budgets, metrics ----------
  # One of three MUTUALLY-EXCLUSIVE gateways, selected by COMPOSE_PROFILES
  # (litellm | bifrost | helicone). litellm is the default — the shipped .env sets
  # COMPOSE_PROFILES=litellm so `docker compose up -d` still yields LiteLLM.
  # See docs/guide/reference/gateway-variants.md.
  litellm:
    image: ghcr.io/berriai/litellm:v1.83.14-stable  # PINNED (was floating main-stable=1.90.3, which hit the "healthy Ollama but router registers 0 deployments" bug — BerriAI/litellm#11330; main-stable is also deprecated as of 2026-06-30). Pin a content tag per LiteLLM guidance.
    container_name: litellm
    profiles: ["litellm"]
    depends_on:
      - litellm_db
      - otel-collector
    ports:
      - "4000:4000"
    volumes:
      - ./config/gateways/litellm-config.yaml:/app/config.yaml:ro
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-local-master}
      - DATABASE_URL=postgresql://litellm:litellm@litellm_db:5432/litellm
      - OLLAMA_API_BASE=${OLLAMA_API_BASE:-http://ollama:11434}
      - VLLM_API_BASE=${VLLM_API_BASE:-http://vllm:8000/v1}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # OTel GenAI spans → collector (limitations §7). Callback enabled in litellm-config.yaml.
      # NOTE: otlp_http uses OTEL_ENDPOINT verbatim, so the /v1/traces path is REQUIRED
      # (LiteLLM does not auto-append it) — without it the collector 404s every span.
      - OTEL_EXPORTER=otlp_http
      - OTEL_ENDPOINT=${OTEL_ENDPOINT:-http://otel-collector:4318/v1/traces}
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    restart: unless-stopped

  # Postgres rides the litellm profile — only LiteLLM needs it for keys/budgets.
  litellm_db:
    image: postgres:16-alpine
    container_name: litellm_db
    profiles: ["litellm"]
    environment:
      - POSTGRES_USER=litellm
      - POSTGRES_PASSWORD=litellm
      - POSTGRES_DB=litellm
    volumes:
      - litellm_pg:/var/lib/postgresql/data
    restart: unless-stopped

  # --- Alternative gateway: Bifrost (Go, µs-class overhead, native OTel) ---
  # Activate INSTEAD of litellm:  COMPOSE_PROFILES=bifrost docker compose up -d
  # Mutually exclusive with litellm/helicone — all three claim host :4000, and only
  # one profile is active at a time. Preserves the four-tier alias vocabulary and the
  # tier-private no-fallback privacy pin (see bifrost-config.json). Bifrost listens on
  # :8080 internally; we map it to the same :4000 seam so clients don't change.
  # EXPERIMENTAL: verify the image tag + config schema against your Bifrost release.
  bifrost:
    image: maximhq/bifrost:v1.5.2
    container_name: bifrost
    profiles: ["bifrost"]
    depends_on:
      - otel-collector
    ports:
      - "4000:8080"
    volumes:
      - ./config/gateways/bifrost-config.json:/app/data/config.json:ro
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OLLAMA_API_BASE=${OLLAMA_API_BASE:-http://ollama:11434}
    command: ["-app-dir", "/app/data"]
    restart: unless-stopped

  # --- Alternative gateway: Helicone AI Gateway (Rust, native OTel + budgets/cache) ---
  # Activate INSTEAD of litellm/bifrost:  COMPOSE_PROFILES=helicone docker compose up -d
  # Mutually exclusive — claims host :4000 like the others. Mirrors the four tiers as
  # named routers (clients call /router/tier-<x>); tier-private routes to one local
  # model with no fallback (privacy pin). Listens :8080 internally, mapped to :4000.
  # EXPERIMENTAL: verify the image tag + config schema against your Helicone release.
  helicone:
    image: helicone/ai-gateway:v1.0.0
    container_name: helicone
    profiles: ["helicone"]
    depends_on:
      - otel-collector
    ports:
      - "4000:8080"
    volumes:
      - ./config/gateways/helicone-config.yaml:/app/config.yaml:ro
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OLLAMA_API_BASE=${OLLAMA_API_BASE:-http://ollama:11434}
    command: ["--config", "/app/config.yaml"]
    restart: unless-stopped

  # --- Optional: learned 90/10 router (RouteLLM, lm-sys) --------------------
  # Exposes an OpenAI-compatible endpoint that decides strong-vs-weak per
  # request. Point it AT LiteLLM so budgets/metrics still apply downstream.
  # CAVEAT: the default 'mf' router calls OpenAI for embeddings (privacy
  # trade-off) — see docs/guide/reference/tiers-and-routing.md (RouteLLM 90/10 dial)
  # and docs/guide/reference/limitations-and-mitigations.md.
  routellm:
    build:
      context: .
      dockerfile: config/gateways/routellm.Dockerfile
    container_name: routellm
    profiles: ["router"]
    depends_on:
      - litellm
    ports:
      - "6060:6060"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}   # required for mf-router embeddings
    command: >
      python -m routellm.openai_server
      --routers mf
      --strong-model openai/tier-frontier
      --weak-model  openai/tier-fast
      --base-url http://litellm:4000/v1
      --api-key ${LITELLM_MASTER_KEY:-sk-local-master}
      --port 6060
    restart: unless-stopped

  # --- Observability ---------------------------------------------------------
  # OTel Collector — receives GenAI spans (gen_ai.* conventions) from the gateway
  # and exposes span-derived metrics on :8889 for Prometheus (limitations §7).
  # Image tag pinned deliberately (the GenAI conventions are still evolving).
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.0
    container_name: otel-collector
    volumes:
      - ./config/observability/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP (gateway posts here)
      - "8889:8889"   # Prometheus exporter (scraped by prometheus)
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - ./config/observability/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  ollama_models:
  hf_cache:
  litellm_pg:
  prom_data:
  grafana_data:
