global:
  scrape_interval: 15s

scrape_configs:
  # LiteLLM exposes /metrics (open-source again since v1.80.0)
  - job_name: litellm
    metrics_path: /metrics
    static_configs:
      - targets: ["litellm:4000"]

  # OTel Collector — GenAI span-derived metrics (gen_ai.* conventions, §7)
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
